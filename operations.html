<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalinga Naturals — Operations</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --navy:#1A3A5C; --navy-d:#12293f; --gold:#D4A853; --gold-d:#b8902f;
    --teal:#4A9D8F; --teal-d:#3a8275; --cream:#F8F4EE; --cream-d:#efe9dd;
    --ink:#1A1A2E; --grey:#6b7280; --line:#e3ddd0;
    --ok:#2E7D32; --ok-bg:#E8F5E9; --warn:#B8860B; --warn-bg:#FFF8E1;
    --bad:#C62828; --bad-bg:#FDECEA; --white:#fff;
    --shadow:0 1px 3px rgba(26,58,92,.08),0 4px 16px rgba(26,58,92,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--cream);color:var(--ink);line-height:1.5;font-size:14px}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;font-weight:700;letter-spacing:-.01em}
  /* ── Top bar ── */
  .topbar{background:var(--navy);color:#fff;padding:0 18px;display:flex;align-items:center;
    gap:16px;height:58px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:10px;font-family:Georgia,serif;font-weight:700;font-size:17px}
  .brand .dot{width:10px;height:10px;background:var(--gold);transform:rotate(45deg);flex:none}
  .brand small{display:block;font-family:-apple-system,sans-serif;font-weight:400;
    font-size:10px;letter-spacing:2px;color:var(--teal);margin-top:-2px}
  .role-switch{margin-left:auto;display:flex;background:var(--navy-d);border-radius:8px;padding:3px;gap:2px}
  .role-switch button{background:none;border:none;color:#9db3c7;font-size:12px;font-weight:600;
    padding:7px 14px;border-radius:6px;cursor:pointer;font-family:inherit}
  .role-switch button.active{background:var(--gold);color:var(--navy)}
  .fx{font-size:11px;color:#9db3c7;display:flex;align-items:center;gap:6px}
  .fx input{width:48px;background:var(--navy-d);border:1px solid #2d4d6b;color:#fff;
    border-radius:5px;padding:3px 5px;font-size:11px;text-align:right}
  /* ── Tabs ── */
  .tabs{background:var(--white);border-bottom:1px solid var(--line);padding:0 18px;
    display:flex;gap:2px;position:sticky;top:58px;z-index:40;overflow-x:auto}
  .tabs button{background:none;border:none;border-bottom:3px solid transparent;
    padding:13px 16px;font-size:13px;font-weight:600;color:var(--grey);cursor:pointer;
    font-family:inherit;white-space:nowrap}
  .tabs button.active{color:var(--navy);border-bottom-color:var(--gold)}
  .tabs button .badge{background:var(--bad);color:#fff;border-radius:10px;font-size:10px;
    padding:1px 6px;margin-left:5px;vertical-align:middle}
  /* ── Layout ── */
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 60px}
  .view{display:none}.view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .page-head h2{font-size:23px;color:var(--navy)}
  .page-head p{color:var(--grey);font-size:13px;margin-top:2px}
  /* ── Cards & grid ── */
  .card{background:var(--white);border:1px solid var(--line);border-radius:12px;
    padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .card h3{font-size:16px;color:var(--navy);margin-bottom:12px}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  /* ── Stat ── */
  .stat{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px;
    box-shadow:var(--shadow)}
  .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);font-weight:600}
  .stat .val{font-size:26px;font-weight:700;font-family:Georgia,serif;color:var(--navy);margin-top:4px}
  .stat .sub{font-size:11px;color:var(--grey);margin-top:2px}
  .stat.gold{border-top:3px solid var(--gold)}
  .stat.teal{border-top:3px solid var(--teal)}
  .stat.navy{border-top:3px solid var(--navy)}
  .stat.ok .val{color:var(--ok)} .stat.bad .val{color:var(--bad)}
  /* ── Forms ── */
  label.fld{display:block;margin-bottom:10px}
  label.fld span{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:4px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-size:14px;font-family:inherit;background:var(--white);color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(212,168,83,.15)}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:120px}
  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;
    border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;transition:filter .15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.gold{background:var(--gold);color:var(--navy)}
  .btn.teal{background:var(--teal)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--navy)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.danger{background:var(--bad)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  /* ── Table ── */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--grey);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--cream)}
  /* ── Pills ── */
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pill.new{background:var(--warn-bg);color:var(--warn)}
  .pill.make{background:#E3F2FD;color:#1565C0}
  .pill.cure{background:#F3E5F5;color:#7B1FA2}
  .pill.ready{background:var(--ok-bg);color:var(--ok)}
  .pill.ship{background:var(--cream-d);color:var(--grey)}
  /* ── Misc ── */
  .empty{text-align:center;padding:46px 20px;color:var(--grey)}
  .empty .big{font-size:40px;margin-bottom:8px;opacity:.5}
  .muted{color:var(--grey);font-size:12px}
  .right{text-align:right}.center{text-align:center}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);
    color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;
    box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.show{opacity:1}
  .owner-only,.prod-only{display:none}
  body[data-role="owner"] .owner-only{display:block}
  body[data-role="owner"] .owner-only.flex{display:flex}
  body[data-role="prod"] .prod-only{display:block}
  /* ── Timer ── */
  .timer-box{background:var(--navy);color:#fff;border-radius:12px;padding:20px;text-align:center}
  .timer-box .time{font-family:Georgia,serif;font-size:46px;font-weight:700;letter-spacing:2px}
  .timer-box .step{color:var(--gold);font-size:13px;font-weight:600;margin-bottom:6px}
  .step-list{list-style:none}
  .step-list li{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .step-list li .n{flex:none;width:24px;height:24px;background:var(--teal);color:#fff;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .low{color:var(--bad);font-weight:700}
  @media print{
    .topbar,.tabs,.no-print{display:none!important}
    .view{display:none!important}.view.print-active{display:block!important}
    body{background:#fff}.card{box-shadow:none;border:1px solid #ccc}
  }
.cmodal{position:fixed;inset:0;background:rgba(20,30,40,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .cmodal .cbox{background:#fff;border-radius:10px;padding:22px;max-width:430px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.45)}
.pm{position:fixed;inset:0;z-index:520;background:rgba(20,30,40,.6);display:flex;align-items:center;justify-content:center;padding:20px}
  .pm-box{background:#fff;border-radius:12px;padding:26px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-role="owner">
<div id="adminGate" style="position:fixed;inset:0;z-index:600;background:#12283f;color:#F8F4EE;display:none;align-items:center;justify-content:center;text-align:center;padding:20px">
  <div style="background:#fff;color:#1A3A5C;border-radius:14px;padding:30px 26px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.45)">
    <img src="images/logo-stacked.png" alt="Kalinga Naturals" style="height:64px;margin-bottom:10px" onerror="this.style.display='none'">
    <h2 style="margin:6px 0 2px;font-family:Georgia,serif;color:#1A3A5C">Manager sign-in</h2>
    <p style="color:#6b7a88;font-size:14px;margin:0 0 18px">Sign in to unlock this app for the team.</p>
    <div id="gsiButton" style="display:flex;justify-content:center"></div>
    <p id="adminErr" style="color:#b3261e;font-size:13px;margin-top:14px;display:none"></p>
  </div>
</div>

<div class="topbar">
  <div class="brand"><span class="dot"></span>
    <div>Kalinga Naturals<small>OPERATIONS</small></div>
  </div>
  <div class="fx no-print">₱<input id="fxRate" type="number" value="42" step="0.5" title="PHP per CAD"> = $1</div>
  <div class="role-switch no-print">
    <button id="roleOwner" class="active" onclick="setRole('owner')">Owner</button>
    <button id="roleProd" onclick="setRole('prod')">Production</button>
  </div>
</div>

<div class="tabs no-print" id="tabs"></div>

<datalist id="uomList"><option value="g"><option value="kg"><option value="ml"><option value="L"><option value="pcs"><option value="pack"><option value="roll"><option value="sheet"><option value="box"><option value="bottle"><option value="bag"></datalist>
<div id="orderForm" class="pm" style="display:none">
  <div class="pm-box" style="max-width:700px;width:100%;text-align:left;max-height:90vh;overflow-y:auto">
    <h3 style="margin:0 0 12px">New order</h3>
    <div id="orderFormBody"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
      <button class="btn ghost" onclick="closeOrderForm()">Close</button>
      <button class="btn gold" onclick="addOrder()">Save</button>
    </div>
  </div>
</div>
<div id="supForm" class="pm" style="display:none">
  <div class="pm-box" style="max-width:560px;text-align:left">
    <h3 id="supFormTitle" style="margin:0 0 12px">Add supplier</h3>
    <div class="row" style="gap:8px">
      <label class="fld" style="flex:2"><span>Name</span><input id="sf_name" placeholder="e.g. Manila Oils Trading"></label>
      <label class="fld" style="flex:1"><span>Phone</span><input id="sf_phone"></label>
    </div>
    <label class="fld"><span>Email</span><input id="sf_email" type="email"></label>
    <label class="fld"><span>Address</span><input id="sf_addr"></label>
    <label class="fld"><span>Account / ID #</span><input id="sf_acct"></label>
    <label class="fld"><span>Note</span><input id="sf_note" placeholder="terms, contact person, etc."></label>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
      <button class="btn ghost" onclick="closeSupplierForm()">Close</button>
      <button class="btn gold" onclick="saveSupplierForm()">Save</button>
    </div>
  </div>
</div>
<div class="wrap">
  <!-- DASHBOARD (owner) -->
  <div class="view" id="view-dash"></div>
  <!-- ORDERS -->
  <div class="view" id="view-orders"></div>
  <!-- MAKE LIST -->
  <div class="view" id="view-make"></div>
  <!-- PRODUCTION -->
  <div class="view" id="view-prod"></div>
  <div class="view" id="view-curing"></div>
  <!-- INVENTORY -->
  <div class="view" id="view-inv"></div>
  <!-- SHIPMENTS -->
  <div class="view" id="view-ship"></div>
  <!-- WORK IN PROGRESS (owner) -->
  <div class="view" id="view-work"></div>
  <!-- SETTINGS (owner) -->
  <div class="view" id="view-settings"></div>
  <!-- TEAM (owner) -->
  <div class="view" id="view-team"></div>
  <div class="view" id="view-suppliers"></div>
  <div class="view" id="view-restock"></div>
</div>

<div id="conflictModal" class="cmodal" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  KALINGA NATURALS — OPERATIONS APP
//  Single-file, persistent shared storage, role-based views
// ============================================================
const FX_DEFAULT = 42; // PHP per CAD
let FX = FX_DEFAULT;

/* ---------- PRODUCT + RECIPE DATA (from business plan) ---------- */
// Costs in PHP per bar unit of each ingredient usage.
// ingredients: {name, grams, phpCost} per single bar.
const PRODUCTS = {
  calamansi:{
    name:"Calamansi Brightening Bar", priceCAD:13, weight:100, cure:35,
    ingredients:[
      {key:"coconut_oil", name:"Virgin Coconut Oil", grams:60, php:8},
      {key:"lye", name:"Sodium Hydroxide (Lye)", grams:14, php:3},
      {key:"calamansi", name:"Calamansi Extract", grams:8, php:6},
      {key:"coconut_milk", name:"Coconut Milk", grams:10, php:3},
      {key:"olive_oil", name:"Olive Oil", grams:15, php:5},
      {key:"castor_oil", name:"Castor Oil", grams:8, php:4},
      {key:"lemongrass_eo", name:"Lemongrass Essential Oil", grams:2, php:7},
    ],
    steps:[
      {t:"Suit up — gloves, goggles, apron. Ventilate the area.", timer:0},
      {t:"Weigh all oils and melt coconut oil gently until liquid.", timer:300},
      {t:"Carefully mix lye into cooled liquids (never water into lye). Stir.", timer:120},
      {t:"Blend to light trace with stick blender.", timer:180},
      {t:"Add calamansi extract, coconut milk, and lemongrass oil. Blend to trace.", timer:120},
      {t:"Pour into moulds. Tap to release air bubbles.", timer:60},
      {t:"Cover and insulate. Leave 24h before unmoulding.", timer:0},
      {t:"Unmould, cut bars, set on curing rack.", timer:0},
    ]
  },
  coconut:{
    name:"Virgin Coconut & Lemongrass", priceCAD:11, weight:100, cure:35,
    ingredients:[
      {key:"coconut_oil", name:"Virgin Coconut Oil", grams:70, php:9},
      {key:"lye", name:"Sodium Hydroxide (Lye)", grams:14, php:3},
      {key:"castor_oil", name:"Castor Oil", grams:10, php:5},
      {key:"lemongrass_eo", name:"Lemongrass Essential Oil", grams:3, php:10},
    ],
    steps:[
      {t:"Suit up — gloves, goggles, apron. Ventilate the area.", timer:0},
      {t:"Melt coconut oil and warm castor oil.", timer:300},
      {t:"Mix lye into cooled liquid carefully. Stir.", timer:120},
      {t:"Blend to trace.", timer:180},
      {t:"Add lemongrass essential oil, blend briefly.", timer:60},
      {t:"Pour into moulds, tap out bubbles.", timer:60},
      {t:"Insulate 24h, then unmould and cut.", timer:0},
      {t:"Set on curing rack.", timer:0},
    ]
  },
  moringa:{
    name:"Moringa & Coconut Milk", priceCAD:14, weight:100, cure:35,
    ingredients:[
      {key:"coconut_oil", name:"Virgin Coconut Oil", grams:55, php:7},
      {key:"lye", name:"Sodium Hydroxide (Lye)", grams:14, php:3},
      {key:"coconut_milk", name:"Coconut Milk", grams:12, php:4},
      {key:"pili_oil", name:"Pili Seed Oil", grams:10, php:9},
      {key:"moringa", name:"Moringa Leaf Powder", grams:4, php:5},
      {key:"olive_oil", name:"Olive Oil", grams:15, php:5},
    ],
    steps:[
      {t:"Suit up — gloves, goggles, apron.", timer:0},
      {t:"Melt and combine coconut, pili, and olive oils.", timer:300},
      {t:"Mix lye into cooled liquid. Stir carefully.", timer:120},
      {t:"Blend to trace.", timer:180},
      {t:"Add coconut milk and moringa powder. Blend to even green colour.", timer:120},
      {t:"Pour into moulds, tap out bubbles.", timer:60},
      {t:"Insulate 24h, unmould, cut.", timer:0},
      {t:"Set on curing rack.", timer:0},
    ]
  },
  charcoal:{
    name:"Charcoal & Lemongrass Detox", priceCAD:12, weight:100, cure:35,
    ingredients:[
      {key:"coconut_oil", name:"Virgin Coconut Oil", grams:65, php:8},
      {key:"lye", name:"Sodium Hydroxide (Lye)", grams:14, php:3},
      {key:"charcoal", name:"Activated Charcoal Powder", grams:3, php:4},
      {key:"lemongrass_eo", name:"Lemongrass Essential Oil", grams:2, php:7},
      {key:"peppermint_eo", name:"Peppermint Essential Oil", grams:1, php:5},
    ],
    steps:[
      {t:"Suit up — gloves, goggles, apron.", timer:0},
      {t:"Melt coconut oil.", timer:300},
      {t:"Mix lye into cooled liquid. Stir.", timer:120},
      {t:"Blend to light trace.", timer:180},
      {t:"Add charcoal powder, lemongrass and peppermint oils. Blend to even black.", timer:120},
      {t:"Pour into moulds, tap out bubbles.", timer:60},
      {t:"Insulate 24h, unmould, cut.", timer:0},
      {t:"Set on curing rack.", timer:0},
    ]
  },
  shampoo:{
    name:"Ylang-Ylang Shampoo Bar", priceCAD:16, weight:90, cure:49,
    ingredients:[
      {key:"sci", name:"Sodium Cocoyl Isethionate", grams:45, php:18},
      {key:"coconut_oil", name:"Virgin Coconut Oil", grams:20, php:3},
      {key:"ylang_eo", name:"Ylang-Ylang Essential Oil", grams:3, php:14},
      {key:"argan_oil", name:"Argan Oil", grams:8, php:12},
      {key:"shea", name:"Shea Butter", grams:12, php:6},
    ],
    steps:[
      {t:"Suit up — gloves, mask (SCI dust), goggles.", timer:0},
      {t:"Warm SCI with coconut oil and shea butter until pliable.", timer:420},
      {t:"Knead in argan oil and ylang-ylang oil to a dough.", timer:240},
      {t:"Press firmly into moulds.", timer:120},
      {t:"Release after 12h. Set to cure (6–8 weeks).", timer:0},
    ]
  },
};

const PROD_KEYS = Object.keys(PRODUCTS);

/* ---------- LABOUR + PACKAGING (per bar, PHP) ---------- */
const LABOUR_PHP_PER_BAR = 71;   // ~$1.70 CAD
const PACKAGING_PHP_PER_BAR = 13; // ~$0.30 CAD
const SHIPPING_PHP_PER_BAR = 29;  // ~$0.69 CAD ocean LCL

/* ---------- STATE ---------- */
let STATE = {
  orders:[],      // {id, customer, email, address, items:{key:qty}, status, created, shipped}
  batches:[],     // {id, product, qty, status, started, curedAt, madeBy, minutes}
  inventory:{},   // {ingredientKey: grams_on_hand}
  ingredientCosts:{}, // override php cost per gram-unit (optional)
  deliveries:[],  // {id, ingredient, grams, phpCost, date}
  shipDates:{},   // {orderId: 'YYYY-MM-DD'} ship-by dates (synced via production state)
  stock:{},       // finished-bar stock (managed in workers app; synced)
  workers:{},     // {cardId:name} legacy (synced)
  roster:[],      // [{id,name,pin,cardId}] worker roster (managed on the workshop tablet; synced)
  suppliers:[],   // [{id,name,phone,address,email,account,note,items:[{key,packSize,minOrder}]}] (synced)
  restock:[],     // [{id,key,supplierId,reason,created}] items to reorder (synced)
  pos:[],         // [{id,num,supplierId,items:[{key,qty,packs}],status,created,sent,received}] (synced)
  reorder:{},     // {supplyKey: reorder level} (synced)
  itemSupplier:{},// {supplyKey: supplierId} chosen supplier per item (synced)
  supplies:{},    // {key:{name,qty}} non-ingredient supplies e.g. labels/wrap (synced)
  uom:{},         // {supplyKey: unit of measure} (synced)
  shifts:[],      // punch records (managed in workers app; synced)
  exportBox:{contents:{},started:''}, exportLog:[], boxStock:0, // export box (workers app; synced)
};

let CURRENT_TAB = 'dash';
let ROLE = 'owner';

/* ---------- top-level helpers (must load before any view code) ---------- */
const $ = s=>document.querySelector(s);
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt = n=>n.toLocaleString('en-CA',{maximumFractionDigits:0});
const fmt2 = n=>n.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const cad = n=>'$'+fmt2(n);
const php = n=>'₱'+fmt(n);
const today = ()=>new Date().toISOString().slice(0,10);
const daysSince = d=>Math.floor((Date.now()-new Date(d).getTime())/86400000);

/* ============================================================
   DASHBOARD (owner)
   ============================================================ */
function weekStart(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x; }
function renderDash(){
  const orders=STATE.orders;
  const shipped=orders.filter(o=>o.status==='shipped');
  const open=orders.filter(o=>o.status!=='shipped');
  const revenue=shipped.reduce((s,o)=>s+orderRevenueCAD(o),0);
  const cost=shipped.reduce((s,o)=>s+orderCostCAD(o),0);
  const profit=revenue-cost;
  const margin=revenue>0?(profit/revenue*100):0;
  const pipelineRev=open.reduce((s,o)=>s+orderRevenueCAD(o),0);

  const _fmt=m=>m?(m/60).toFixed(1):'·';
  const wkRows=Object.entries(_grid).sort((a,b)=>b[1].reduce((x,y)=>x+y,0)-a[1].reduce((x,y)=>x+y,0)).map(([n,arr])=>{const tot=arr.reduce((x,y)=>x+y,0);return `<tr><td><strong>${n}</strong></td>${arr.map(m=>`<td class="right">${_fmt(m)}</td>`).join('')}<td class="right"><strong>${(tot/60).toFixed(1)}h</strong></td></tr>`;}).join('');

  const _made=STATE.batches.filter(b=>['cure','ready','shipped'].indexOf(b.status)>=0 && b.madeBy && _inWeek(b));
  const _agg={}; _made.forEach(b=>{ const w=_agg[b.madeBy]||(_agg[b.madeBy]={batches:0,bars:0,min:0}); w.batches++; w.bars+=b.qty||0; w.min+=b.minutes||0; });

  $('#view-dash').innerHTML=`

        <tbody>${PROD_KEYS.map(pk=>{

function addOrder(){
  const gv=id=>{const e=$('#'+id);return e?e.value.trim():'';};
  const customer=(gv('ord_first')+' '+gv('ord_last')).trim();
  if(!customer){toast('Enter a customer name');return;}
  const items={};let any=false;
  PROD_KEYS.forEach(pk=>{const q=parseInt($('#ord_'+pk).value)||0;if(q>0){items[pk]=q;any=true;}});
  if(!any){toast('Add at least one product');return;}
  const lines=[gv('ord_street'),gv('ord_line2'),gv('ord_city'),(gv('ord_prov')+' '+gv('ord_postal')).trim(),gv('ord_country')].filter(Boolean);
  if(gv('ord_phone')) lines.push('Tel: '+gv('ord_phone'));
  const order={id:'web-'+uid(),customer,email:gv('ord_email'),phone:gv('ord_phone'),
    address:lines.join(', '),items,status:'new',created:today(),shipped:null,agreedTotal:gv('ord_agreed')||null};
  STATE.orders.push(order);
  if(gv('ord_shipby')){STATE.shipDates=STATE.shipDates||{};STATE.shipDates[order.id]=gv('ord_shipby');}

function setShipDate(id){
  STATE.shipDates=STATE.shipDates||{};
  const cur=STATE.shipDates[id]||'';
  const d=prompt('Ship-by date (YYYY-MM-DD), leave blank to clear:', cur);
  if(d===null) return;
  if(d.trim()===''){ delete STATE.shipDates[id]; } else { STATE.shipDates[id]=d.trim(); }
  saveState(); renderOrders(); renderTabs();
}
function queueOrder(id){
  const o=STATE.orders.find(x=>x.id===id);if(!o)return;
  o.status='make';
  patchOrderOnBackend(id,{status:'make'});   // keep server in sync
  // create/merge batches per product
  Object.entries(o.items).forEach(([pk,q])=>{
    STATE.batches.push({id:uid(),product:pk,qty:q,status:'make',orderId:id,
      started:null,curedAt:null,madeBy:'',minutes:0,created:today()});
  });
  saveState();toast('Queued to make list');renderOrders();renderTabs();
}
function delOrder(id){
  if(!confirm('Delete this order?'))return;
  STATE.orders=STATE.orders.filter(o=>o.id!==id);
  STATE.batches=STATE.batches.filter(b=>b.orderId!==id);
  const s=loadSync(); if(s.deleted.indexOf(id)===-1){s.deleted.push(id);saveSync(s);}
  saveState();renderOrders();renderTabs();
}

/* ============================================================
   MAKE LIST  (aggregated demand)
   ============================================================ */
const BATCH_SIZE=60;
function producedMap(){
  // available finished bars: box being filled (PH) + boxes still in transit + Canada stock on hand.
  // Received boxes have already been added to STATE.stock, and sold bars have left it, so we
  // count unreceived exportLog + stock (never both) — this excludes bars already sold to customers.
  const m={}, add=o=>Object.entries(o||{}).forEach(([k,q])=>m[k]=(m[k]||0)+q);
  add((STATE.exportBox&&STATE.exportBox.contents)||{});
  (STATE.exportLog||[]).forEach(b=>{ if(!b.received) add(b.contents); });
  add(STATE.stock||{});
  return m;
}
function computeNeed(){
  const open=STATE.orders.filter(o=>o.status!=='shipped');
  const ordered={}; open.forEach(o=>Object.entries(o.items).forEach(([k,q])=>{ if(q>0) ordered[k]=(ordered[k]||0)+q; }));
  const made=producedMap();
  const wip={}; STATE.batches.filter(b=>b.status==='make'||b.status==='cure').forEach(b=>{ wip[b.product]=(wip[b.product]||0)+(b.qty||0); });
  const per={};
  PROD_KEYS.forEach(pk=>{ const ord=ordered[pk]||0, md=made[pk]||0, w=wip[pk]||0; const need=Math.max(0,ord-md-w);
    per[pk]={ordered:ord,made:md,wip:w,needBars:need,batches:Math.ceil(need/BATCH_SIZE)}; });
  return per;
}
function totalBatchesNeeded(){ const p=computeNeed(); return PROD_KEYS.reduce((s,pk)=>s+p[pk].batches,0); }
function renderCuring(){
  const curing=STATE.batches.filter(b=>b.status==='cure');
  const readyDate=b=>b.curedAt?new Date(new Date(b.curedAt).getTime()+PRODUCTS[b.product].cure*86400000).toISOString().slice(0,10):'—';
  const isDone=b=>daysSince(b.curedAt||b.started||b.created)>=PRODUCTS[b.product].cure;
  const rows=curing.slice().sort((a,b)=>{const da=isDone(a),db=isDone(b);if(da!==db)return da?-1:1;return (a.rack||0)-(b.rack||0);}).map(b=>{
    const total=PRODUCTS[b.product].cure, d=daysSince(b.curedAt||b.started||b.created), done=d>=total;
    return `<tr><td><strong>Rack ${b.rack||'—'}</strong><div class="muted">${b.num||''}</div></td>
      <td>${PRODUCTS[b.product].name.replace(' Bar','')}<div class="muted">${b.qty} bars · ${b.madeBy||'—'}</div></td>
      <td>${Math.min(d,total)}/${total} days${done?' ✓':''}<div class="muted">ready ${readyDate(b)}</div></td></tr>`;
  }).join('');
  const doneCount=curing.filter(isDone).length;
  $('#view-curing').innerHTML=`
    <div class="page-head"><div><h2>Curing</h2><p>Batches curing in the Philippines workshop and when each is ready. The team marks them ready on the tablet.</p></div></div>
    <div class="card"><h3>Curing now <span class="muted">(${curing.length}${doneCount?`, ${doneCount} ready`:''})</span></h3>
      ${curing.length?`<table><thead><tr><th>Rack</th><th>Batch</th><th>Cure</th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty"><div class="big">◇</div>Nothing curing right now.</div>`}
    </div>`;
}
function neededBatches(){ return STATE.batches.filter(b=>b.status==='make'); }
function renderMake(){
  // aggregate make demand by product
  const agg={};
  STATE.batches.filter(b=>b.status==='make').forEach(b=>{agg[b.product]=(agg[b.product]||0)+b.qty;});
  const curing=STATE.batches.filter(b=>b.status==='cure');
  // total grams of each ingredient reserved by everything currently queued to make
  const reservedAll={};
  STATE.batches.filter(b=>b.status==='make').forEach(b=>{
    PRODUCTS[b.product].ingredients.forEach(i=>{reservedAll[i.key]=(reservedAll[i.key]||0)+i.grams*b.qty;});
  });
  const cards=Object.entries(agg).map(([pk,qty])=>{
    // requirements; availability = on-hand minus what OTHER queued batches reserved
    const reqs=PRODUCTS[pk].ingredients.map(i=>{
      const need=i.grams*qty, have=STATE.inventory[i.key]||0, avail=have-((reservedAll[i.key]||0)-need);
      return {name:i.name,need,have,avail,short:avail<need};
    });
    const canMake=reqs.every(r=>!r.short);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><h3 style="margin-bottom:2px">${PRODUCTS[pk].name}</h3>
          <div class="muted">${qty} bars to make · cure ${PRODUCTS[pk].cure} days</div></div>
        <span class="pill make">${qty}</span>
      </div>
      <div class="divider"></div>
      <table><thead><tr><th>Ingredient</th><th class="right">Need</th><th class="right">Have</th><th class="right">Avail</th></tr></thead>
        <tbody>${reqs.map(r=>`<tr><td>${r.name}</td><td class="right">${r.need} g</td>
          <td class="right">${r.have} g</td><td class="right ${r.short?'low':''}">${r.avail} g${r.short?' ⚠':''}</td></tr>`).join('')}</tbody></table>
      ${canMake?'':`<p class="muted" style="color:var(--bad);margin-top:8px">Not enough stock — log a delivery in Inventory.</p>`}
      <button class="btn teal" style="margin-top:12px" onclick="startMaking('${pk}')">Start making → Production</button>
    </div>`;
  }).join('');

  $('#view-make').innerHTML=`
    <div class="page-head"><div>
      <h2>Make List</h2><p>Everything queued from orders, grouped by product. Check stock, then start making.</p>
    </div></div>
    ${Object.keys(agg).length?`<div class="grid g2">${cards}</div>`:
      `<div class="card"><div class="empty"><div class="big">◇</div>Nothing queued. Queue orders from the Orders tab.</div></div>`}
    ${curing.length?`<div class="card"><h3>Curing now (${curing.length} batches)</h3>
      <table><thead><tr><th>Product</th><th class="right">Qty</th><th>Started</th><th>Cure progress</th><th class="no-print"></th></tr></thead>
      <tbody>${curing.map(b=>{
        const d=daysSince(b.curedAt||b.started||b.created),total=PRODUCTS[b.product].cure;
        const pct=Math.min(100,Math.round(d/total*100)),done=d>=total;
        return `<tr><td>${PRODUCTS[b.product].name}</td><td class="right">${b.qty}</td>
          <td>${b.curedAt||'—'}</td>
          <td><div style="background:var(--cream-d);border-radius:6px;height:8px;width:120px;overflow:hidden">
            <div style="background:${done?'var(--ok)':'var(--teal)'};height:100%;width:${pct}%"></div></div>
            <span class="muted">${d}/${total} days</span></td>
          <td class="no-print"><button class="btn sm ghost" onclick="backToMake('${b.id}')">← Back</button>${done?`<button class="btn sm gold" onclick="markReady('${b.id}')">Mark ready</button>`:''}</td></tr>`;
      }).join('')}</tbody></table></div>`:''}
    ${(function(){const ready=STATE.batches.filter(b=>b.status==='ready');return ready.length?`<div class="card"><h3>Ready to ship (${ready.length} batches)</h3><table><thead><tr><th>Product</th><th class="right">Qty</th><th>Made by</th><th class="no-print"></th></tr></thead><tbody>${ready.map(b=>`<tr><td>${PRODUCTS[b.product].name}</td><td class="right">${b.qty}</td><td>${b.madeBy||'—'}</td><td class="no-print"><button class="btn sm ghost" onclick="backReady('${b.id}')">← Back to cure</button></td></tr>`).join('')}</tbody></table></div>`:'';})()}`;
}
function startMaking(pk){ PRODUCTION_FOCUS=pk; switchTab('prod'); }
// ---- Back (reverse a stage). Rule: Back = previous stage, Delete = gone for good. ----
function backOrder(id){
  const o=STATE.orders.find(x=>x.id===id);if(!o)return;
  if(!confirm('Move this order back to New? Its queued batches will be removed.'))return;
  o.status='new';
  patchOrderOnBackend(id,{status:'new'});
  STATE.batches=STATE.batches.filter(b=>b.orderId!==id);
  saveState();toast('Moved back to New');renderOrders();renderTabs();
}
function backToMake(id){
  const b=STATE.batches.find(x=>x.id===id);if(!b)return;
  b.status='make';b.curedAt=null;
  saveState();toast('Back to make list');renderMake();renderTabs();
}
function backReady(id){
  const b=STATE.batches.find(x=>x.id===id);if(!b)return;
  b.status='cure';if(!b.curedAt)b.curedAt=today();
  saveState();toast('Back to curing');renderMake();renderTabs();
}
function unshipOrder(id){
  const o=STATE.orders.find(x=>x.id===id);if(!o)return;
  o.status='new';o.shipped=null;
  patchOrderOnBackend(id,{status:'new',shipped:null});
  STATE.stock=STATE.stock||{};
  Object.entries(o.items).forEach(([k,q])=>{ STATE.stock[k]=(STATE.stock[k]||0)+q; });
  saveState();if(typeof pushState==='function') pushState();toast('Un-shipped — stock returned');renderShip();renderTabs();
}

function loadTimer(stepIndex,secs){
  TIMER.remain=secs;TIMER.stepIndex=stepIndex;TIMER.product=PRODUCTION_FOCUS;
  if(TIMER.int){clearInterval(TIMER.int);TIMER.int=null;}
  $('#timerStep').textContent='Step '+(stepIndex+1);
  $('#timerStart').textContent='Start step timer';
  updateTimerDisplay();
}
function timerToggle(){
  if(TIMER.int){clearInterval(TIMER.int);TIMER.int=null;$('#timerStart').textContent='Resume';return;}
  if(TIMER.remain<=0){toast('Pick a step timer first');return;}
  $('#timerStart').textContent='Pause';
  TIMER.int=setInterval(()=>{
    TIMER.remain--;updateTimerDisplay();
    if(TIMER.remain<=0){clearInterval(TIMER.int);TIMER.int=null;
      $('#timerStart').textContent='Start step timer';
      try{new AudioContext();}catch(e){}
      toast('⏱ Step timer done!');
      $('#timerBox').style.background='var(--ok)';
      setTimeout(()=>$('#timerBox').style.background='',1500);
    }
  },1000);
}
function timerReset(){if(TIMER.int)clearInterval(TIMER.int);TIMER.int=null;TIMER.remain=0;
  TIMER.stepIndex=-1;$('#timerStep').textContent='Ready';$('#timerStart').textContent='Start step timer';updateTimerDisplay();}
function updateTimerDisplay(){
  const el=$('#timerTime');if(!el)return;
  const m=Math.floor(TIMER.remain/60),s=TIMER.remain%60;
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function logProduction(pk){
  const qty=parseInt($('#madeQty').value)||0;
  const by=$('#madeBy').value.trim();
  const min=parseInt($('#madeMin').value)||0;
  if(qty<1){toast('Enter quantity made');return;}
  // deduct inventory
  PRODUCTS[pk].ingredients.forEach(i=>{
    STATE.inventory[i.key]=Math.max(0,(STATE.inventory[i.key]||0)-i.grams*qty);
  });
  // move matching 'make' batches to 'cure', or create a stock batch
  const makeB=STATE.batches.filter(b=>b.status==='make'&&b.product===pk);
  if(makeB.length){ makeB.forEach(b=>{b.status='cure';b.curedAt=today();b.madeBy=by;b.minutes=min;}); }
  else { STATE.batches.push({id:uid(),product:pk,qty,status:'cure',orderId:null,
    started:today(),curedAt:today(),madeBy:by,minutes:min,created:today()}); }
  saveState();toast(`${qty} bars logged — now curing`);renderProd();renderTabs();
}

/* ---- order sync ---- */
function mergeServerOrders(orders, sync){
  let changed=false; const byId={}; STATE.orders.forEach(o=>byId[o.id]=o);
  orders.forEach(srv=>{
    if(sync.deleted.indexOf(srv.id)!==-1) return;       // locally deleted -> don't resurrect
    if(!byId[srv.id]){ STATE.orders.push(srv); byId[srv.id]=srv; changed=true; }
  });
  return changed;
}
async function pollBackend(){
  if(!BACKEND_URL) return;
  const sync = loadSync();
  try{
    const r = await fetch(backendBase()+'/orders?since='+encodeURIComponent(sync.cursor||''), {headers:{'X-Kalinga-Token':BACKEND_READ_TOKEN,'X-Kalinga-Session':ADMIN_SESSION}});
    if(!r.ok) return;
    const data = await r.json();
    if(!data || !data.ok || !Array.isArray(data.orders)) return;
    const changed = mergeServerOrders(data.orders, sync);
    if(data.cursor) sync.cursor = data.cursor;
    saveSync(sync);
    if(changed){ cacheLocal(); rerenderCurrent(); toast('New order synced'); }
  }catch(e){}
}

function _isObj(x){ return x && typeof x==='object' && !Array.isArray(x); }
function _eq(a,b){ return JSON.stringify(a)===JSON.stringify(b); }
function _stripU(r){ if(!_isObj(r)) return r; const o={}; for(const k in r){ if(k!=='_u') o[k]=r[k]; } return o; }
function unionByU(mine, theirs, base){
  const bm={}; (Array.isArray(base)?base:[]).forEach(r=>{ if(r&&r.id!=null) bm[r.id]=JSON.stringify(_stripU(r)); });
  const mm={}, tm={}; (mine||[]).forEach(r=>{ if(r&&r.id!=null) mm[r.id]=r; }); (theirs||[]).forEach(r=>{ if(r&&r.id!=null) tm[r.id]=r; });
  const ids=[...new Set([...Object.keys(mm),...Object.keys(tm)])];
  const out=[];
  ids.forEach(id=>{
    const b=bm[id], mr=mm[id], tr=tm[id];
    if(mr&&tr){ out.push(((mr._u||0) >= (tr._u||0)) ? mr : tr); }          // newest timestamp wins
    else if(mr&&!tr){ if(!(b!==undefined && b===JSON.stringify(_stripU(mr)))) out.push(mr); }  // keep unless unchanged & deleted remotely
    else if(tr&&!mr){ if(!(b!==undefined && b===JSON.stringify(_stripU(tr)))) out.push(tr); }  // keep unless deleted locally
  });
  out.sort((a,b)=>String(a.created||'').localeCompare(String(b.created||''))||String(a.id).localeCompare(String(b.id)));
  return out;
}
function mergeObj(base, mine, theirs){
  const bo=_isObj(base)?base:{}; const out={};
  const keys=[...new Set([...Object.keys(mine),...Object.keys(theirs)])];
  keys.forEach(k=>{ out[k]=merge3(bo[k], mine[k], theirs[k]); });
  return out;
}
function merge3(base, mine, theirs){
  if(theirs===undefined) return mine;
  if(mine===undefined) return theirs;
  if(_eq(mine,theirs)) return mine;
  if(_eq(mine,base)) return theirs;
  if(_eq(theirs,base)) return mine;
  if(_isObj(mine)&&_isObj(theirs)) return mergeObj(base,mine,theirs);
  return theirs;
}
function mergeServer(sv){
  let changed=false;
  SYNC_AREAS.forEach(a=>{
    const theirs=sv?sv[a]:undefined; if(theirs===undefined) return;
    const mine=STATE[a];
    let merged;
    if(LIST_AREAS.indexOf(a)>=0 && Array.isArray(mine) && Array.isArray(theirs)){
      const base=_syncedSnap[a]!==undefined?JSON.parse(_syncedSnap[a]):[];
      merged=unionByU(mine, theirs, base);
    } else {
      const base=_syncedSnap[a]!==undefined?JSON.parse(_syncedSnap[a]):undefined;
      merged=merge3(base, mine, theirs);
    }
    if(!_eq(merged, mine)){ STATE[a]=merged; changed=true; }
  });
  return changed;
}
// record stamping: mark a record _u=now when its content changes locally
let _stampPrev=null;
function stampInit(){ _stampPrev={}; LIST_AREAS.forEach(a=>{ const m={}; (STATE[a]||[]).forEach(r=>{ if(r&&r.id!=null) m[r.id]=JSON.stringify(_stripU(r)); }); _stampPrev[a]=m; }); }
function stampChanges(){
  if(!_stampPrev) stampInit();
  const now=Date.now();
  LIST_AREAS.forEach(a=>{ const arr=STATE[a]; if(!Array.isArray(arr)) return; const prev=_stampPrev[a]||{}, cur={};
    arr.forEach(r=>{ if(!r||r.id==null) return; const j=JSON.stringify(_stripU(r)); cur[r.id]=j; if(prev[r.id]!==j) r._u=now; });
    _stampPrev[a]=cur; });
}
async function fetchServerState(){
  try{ const r=await fetch(backendBase()+'/state',{headers:{'X-Kalinga-Token':BACKEND_READ_TOKEN,'X-Kalinga-Session':ADMIN_SESSION}});
    if(!r.ok) return null; const d=await r.json(); if(!d||!d.ok) return null; return d; }catch(e){ return null; }
}
async function pushState(){
  if(!BACKEND_URL || _pushing) return;
  _pushing=true;
  try{
    const d=await fetchServerState();
    const sv=d?d.value:null;
    mergeServer(sv);
    const r=await fetch(backendBase()+'/state',{method:'PUT',headers:{'Content-Type':'application/json','X-Kalinga-Token':BACKEND_WRITE_TOKEN,'X-Kalinga-Session':ADMIN_SESSION},body:JSON.stringify({value:productionPayload()})});
    if(r.ok){ const rd=await r.json(); if(rd&&rd.ok){ stateVersion=rd.version; const s=loadSync(); s.stateVersion=stateVersion; saveSync(s); } }
    _syncedSnap=snapshot(); stampInit(); cacheLocal(); rerenderCurrent();
  }catch(e){} finally{ _pushing=false; }
}
async function pullState(){
  if(!BACKEND_URL || _pushing) return;
  const d=await fetchServerState();
  if(!d || !d.value) return;
  const changed=mergeServer(d.value);
  stateVersion=d.version;
  _syncedSnap=snapshot(); stampInit();
  if(changed){ cacheLocal(); rerenderCurrent(); }
}

function showConflict(areas, sv){

  const names={batches:'Production batches',inventory:'Inventory stock',deliveries:'Deliveries',ingredientCosts:'Ingredient costs',shipDates:'Delivery dates'};
  const li=areas.map(a=>`<li>${names[a]||a}</li>`).join('');

  mEl.innerHTML=`<div class="cbox"><h3 style="margin-top:0">Sync conflict</h3>
    <p class="muted">These changed here <b>and</b> on another device since the last sync:</p>

    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn gold" onclick="resolveConflict('mine')">Keep mine</button>
      <button class="btn teal" onclick="resolveConflict('theirs')">Use other device</button></div></div>`;
  mEl.style.display='flex';
}
function resolveConflict(choice){
  const ctx=_conflictCtx; if(!ctx) return;
  ctx.areas.forEach(a=>{
    const theirs = ctx.sv && ctx.sv[a]!==undefined ? ctx.sv[a] : undefined;
    if(choice==='theirs' && theirs!==undefined){ STATE[a]=theirs; }
    _syncedSnap[a]=JSON.stringify(theirs!==undefined?theirs:STATE[a]);
  });
  _conflictCtx=null; const mEl=$('#conflictModal'); if(mEl) mEl.style.display='none';
  cacheLocal(); rerenderCurrent(); pushState();
}

function startBackendSync(){
  if(!BACKEND_URL) return;
  _syncedSnap = snapshot();
  pollBackend(); pullState();
  setInterval(()=>{ pollBackend(); pullState(); }, POLL_MS);
}

  const rows=(p.items||[]).map(it=>`<tr><td>${supplyName(it.key)}</td><td class="right">${it.qty} ${supplyUnit(it.key)}</td></tr>`).join('');
  const el=$('#poPrint'); if(!el) return; el.classList.add('print-active');
  el.innerHTML=`<div class="card" style="max-width:560px;margin:20px auto">
    <div style="text-align:center;border-bottom:2px solid var(--gold);padding-bottom:12px;margin-bottom:14px">
      <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--navy)">KALINGA NATURALS</div>
      <div class="muted">Purchase Order</div></div>
    <p><strong>${p.num}</strong> · ${p.created}</p>
    <p style="margin:8px 0"><strong>Supplier:</strong> ${s.name||'—'}${s.account?` (Acct ${s.account})`:''}<br>${[s.phone,s.email,s.address].filter(Boolean).join(' · ')}</p>
    <p><strong>Ship to:</strong> Kalinga Naturals workshop</p>
    <table style="margin-top:10px"><thead><tr><th>Item</th><th class="right">Quantity</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="no-print center" style="margin-top:16px">
      <button class="btn gold" onclick="window.print()">Print / Save PDF</button>
      <button class="btn ghost" onclick="closePO()">Close</button></div></div>`;
  document.querySelectorAll('#view-restock>.card').forEach(c=>c.classList.add('no-print'));
  window.scrollTo(0,document.body.scrollHeight);
}
function closePO(){ const el=$('#poPrint'); if(el){ el.classList.remove('print-active'); el.innerHTML=''; } document.querySelectorAll('#view-restock>.card').forEach(c=>c.classList.remove('no-print')); }
function poCard(p){
  const s=supplierById(p.supplierId);
  const rows=(p.items||[]).map(it=>`<tr><td>${supplyName(it.key)}</td><td class="right">${it.qty} ${supplyUnit(it.key)}</td><td class="right muted">${it.packs} pack${it.packs>1?'s':''}</td></tr>`).join('');
  const pill=p.status==='draft'?'<span class="pill make">draft</span>':(p.status==='sent'?'<span class="pill new">sent</span>':'<span class="pill ready">received</span>');
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><h3 style="margin-bottom:2px">${p.num}</h3><div class="muted">${s?s.name:'—'} · ${p.created}</div></div>${pill}
    </div>
    <table style="margin-top:8px"><thead><tr><th>Item</th><th class="right">Qty</th><th class="right">Packs</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
      <button class="btn ghost" onclick="printPO('${p.id}')">🖨 PDF</button>
      ${s&&s.email?`<button class="btn teal" onclick="emailPO('${p.id}')">✉ Email supplier</button>`:''}
      ${p.status==='draft'?`<button class="btn ghost" onclick="markPOSent('${p.id}')">Mark sent</button>`:''}
      ${p.status!=='received'?`<button class="btn gold" onclick="receivePO('${p.id}')">✓ Received → add to stock</button>`:''}
    </div></div>`;
}
function renderRestock(){
  if(typeof checkReorder==='function') checkReorder();
  const list=(STATE.restock||[]).slice();
  const rkRows=list.map(r=>{
    const key=r.key, s=supplierById(r.supplierId), unit=supplyUnit(key);
    const item=(s&&(s.items||[]).find(i=>i.key===key))||{};
    const pack=item.packSize||1, minO=item.minOrder||0;
    const onHand=supplyOnHand(key), lvl=(STATE.reorder||{})[key]||0;
    const suggest=Math.max(roundUp(Math.max(lvl*2-onHand, pack), pack), minO, pack);
    return `<tr>
      <td class="no-print"><input type="checkbox" class="rk-chk" data-id="${r.id}" ${r.supplierId?'checked':''}></td>
      <td>${supplyName(key)}<div class="muted">${r.reason==='low'?'auto · low stock':'manual'}${pack>1?` · sold in ${pack}s`:''}</div></td>
      <td>${s?s.name:'<span style="color:#b3261e">no supplier</span>'} ${s?'':`<button class="btn sm ghost" onclick="pickRestockSupplier('${r.id}')">set</button>`}</td>
      <td class="right">${onHand} ${unit}</td>
      <td class="right"><input type="number" min="0" value="${suggest}" id="rk-qty-${r.id}" style="width:80px"></td>
      <td class="right no-print"><button class="btn sm ghost" onclick="removeRestock('${r.id}')">✕</button></td>
    </tr>`;
  }).join('');
  const open=(STATE.pos||[]).filter(p=>p.status!=='received').slice().reverse();
  const done=(STATE.pos||[]).filter(p=>p.status==='received').slice().reverse().slice(0,15);
  $('#view-restock').innerHTML=`
    <div class="page-head"><div><h2>Restock</h2><p>Low items appear here automatically. Tick what to order and Generate PO's — one per supplier, rounded up to their pack size.</p></div></div>
    <div class="card"><h3>To order <span class="muted">(${list.length})</span></h3>
      ${list.length?`<table><thead><tr><th class="no-print"></th><th>Item</th><th>Supplier</th><th class="right">On hand</th><th class="right">Order qty</th><th class="no-print"></th></tr></thead><tbody>${rkRows}</tbody></table>
        <div class="no-print" style="margin-top:12px"><button class="btn gold" onclick="generatePOs()">Generate PO's</button></div>`
        :`<div class="empty"><div class="big">◇</div>Nothing to reorder right now.</div>`}
    </div>
    <div class="card"><h3>Purchase orders <span class="muted">(${open.length} open)</span></h3>
      ${open.length?open.map(poCard).join(''):`<p class="muted">No open purchase orders.</p>`}
    </div>
    ${done.length?`<div class="card"><h3>Received recently</h3>
      <table><thead><tr><th>PO</th><th>Supplier</th><th>Received</th></tr></thead><tbody>${done.map(p=>{const s=supplierById(p.supplierId);return `<tr><td>${p.num}</td><td>${s?s.name:'—'}</td><td>${p.received}</td></tr>`;}).join('')}</tbody></table></div>`:''}
    <div class="view" id="poPrint"></div>`;
}
/* ============================================================
   SUPPLIERS  (manager-only)
   ============================================================ */
function supplyName(key){
  if(key==='box') return 'Export box';
  const ing=allIngredients()[key]; if(ing) return ing.name;
  if(STATE.supplies&&STATE.supplies[key]) return STATE.supplies[key].name;
  return key;
}
function supplyKeyOptions(selected){
  const ing=Object.values(allIngredients()).map(i=>({key:i.key,name:i.name}));
  const all=ing.concat([{key:'box',name:'Export box'}]).concat(Object.entries(STATE.supplies||{}).map(([k,v])=>({key:k,name:v.name})));
  return all.map(o=>`<option value="${o.key}" ${o.key===selected?'selected':''}>${o.name}</option>`).join('');
}
function supplierById(id){ return (STATE.suppliers||[]).find(x=>x.id===id); }
function renderSuppliers(){
  const sups=(STATE.suppliers||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));
  const cards=sups.map(s=>{
    const itemRows=(s.items||[]).map(it=>`<tr>
      <td>${supplyName(it.key)}</td>
      <td class="right"><input type="number" min="1" value="${it.packSize||1}" style="width:60px" onchange="setSupItem('${s.id}','${it.key}','pack',this.value)"> ${supplyUnit(it.key)}</td>
      <td class="right"><input type="number" min="0" value="${it.minOrder||0}" style="width:60px" onchange="setSupItem('${s.id}','${it.key}','min',this.value)"> ${supplyUnit(it.key)}</td>
      <td class="right no-print"><button class="btn sm ghost" onclick="removeSupItem('${s.id}','${it.key}')">✕</button></td>
    </tr>`).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><h3 style="margin-bottom:2px">${s.name}</h3>
          <div class="muted">${[s.phone,s.email].filter(Boolean).join(' · ')||'—'}</div></div>
        <div class="no-print"><button class="btn sm ghost" onclick="editSupplier('${s.id}')">Edit</button> <button class="btn sm ghost" onclick="deleteSupplier('${s.id}')">Delete</button></div>
      </div>
      <div class="muted" style="margin-top:6px">${s.address||''}${s.account?` · Acct ${s.account}`:''}${s.note?`<br>${s.note}`:''}</div>
      <div class="divider"></div>
      <h4 style="margin:6px 0">Supplies</h4>
      ${(s.items&&s.items.length)?`<table><thead><tr><th>Item</th><th class="right">Sold in (pack)</th><th class="right">Min order</th><th class="no-print"></th></tr></thead><tbody>${itemRows}</tbody></table>`:`<p class="muted">No items yet — add what they supply below.</p>`}
      <div class="no-print row" style="gap:8px;align-items:flex-end;margin-top:10px">
        <label class="fld" style="flex:2"><span>Add item</span><select id="si-key-${s.id}">${supplyKeyOptions()}</select></label>
        <label class="fld" style="flex:1"><span>Pack size</span><input id="si-pack-${s.id}" type="number" min="1" value="1"></label>
        <label class="fld" style="flex:1"><span>Min order</span><input id="si-min-${s.id}" type="number" min="0" value="0"></label>
        <label class="fld" style="flex:1"><span>Unit</span><input id="si-uom-${s.id}" list="uomList" placeholder="pcs"></label>
        <button class="btn gold" onclick="addSupItem('${s.id}')">+ Add</button>
      </div>
    </div>`;
  }).join('');
  $('#view-suppliers').innerHTML=`
    <div class="page-head"><div><h2>Suppliers</h2><p>Your vendors and what they supply. <strong>Pack size</strong> is the increment orders round up to; <strong>min order</strong> is their minimum quantity.</p></div></div>
    <div class="no-print" style="margin-bottom:14px"><button class="btn gold" onclick="openSupplierForm()">+ Add supplier</button></div>
    ${sups.length?`<div class="grid g2">${cards}</div>`:`<div class="card"><div class="empty"><div class="big">◇</div>No suppliers yet — add your first with the button above.</div></div>`}`;
}
let _supEditId=null;
function openSupplierForm(id){
  _supEditId=id||null; const s=id?supplierById(id):null;
  const m=document.getElementById('supForm'); if(!m) return;
  m.querySelector('#supFormTitle').textContent=s?'Edit supplier':'Add supplier';
  const set=(f,v)=>{ const el=m.querySelector('#'+f); if(el) el.value=v||''; };
  set('sf_name',s&&s.name); set('sf_phone',s&&s.phone); set('sf_email',s&&s.email);
  set('sf_addr',s&&s.address); set('sf_acct',s&&s.account); set('sf_note',s&&s.note);
  m.style.display='flex'; setTimeout(()=>{const n=m.querySelector('#sf_name'); if(n) n.focus();},60);
}
function closeSupplierForm(){ const m=document.getElementById('supForm'); if(m) m.style.display='none'; _supEditId=null; }
function saveSupplierForm(){
  const m=document.getElementById('supForm'); const g=f=>(m.querySelector('#'+f).value||'').trim();
  const name=g('sf_name'); if(!name){ toast('Enter a supplier name'); return; }
  if(_supEditId){
    const s=supplierById(_supEditId);
    if(s){ s.name=name; s.phone=g('sf_phone'); s.email=g('sf_email'); s.address=g('sf_addr'); s.account=g('sf_acct'); s.note=g('sf_note'); }
  } else {
    STATE.suppliers=STATE.suppliers||[];
    STATE.suppliers.push({id:uid(), name, phone:g('sf_phone'), email:g('sf_email'), address:g('sf_addr'), account:g('sf_acct'), note:g('sf_note'), items:[]});
  }
  saveState(); if(typeof pushState==='function')pushState(); closeSupplierForm(); renderSuppliers(); toast('Saved');
}
function setSupItem(sid,key,which,val){
  const s=supplierById(sid); if(!s) return; const it=(s.items||[]).find(i=>i.key===key); if(!it) return;
  const n=parseInt(val);
  if(which==='pack'){ if(n>0) it.packSize=n; } else { if(n>=0) it.minOrder=n; }
  saveState(); if(typeof pushState==='function')pushState();
}
function addSupplier(){
  const g=id=>{const e=$('#'+id);return e?e.value.trim():'';};
  const name=g('sup_name'); if(!name){ toast('Enter a supplier name'); return; }
  STATE.suppliers=STATE.suppliers||[];
  STATE.suppliers.push({id:uid(), name, phone:g('sup_phone'), email:g('sup_email'), address:g('sup_addr'), account:g('sup_acct'), note:g('sup_note'), items:[]});
  saveState(); if(typeof pushState==='function') pushState(); renderSuppliers(); toast(name+' added');
}
function editSupplier(id){ openSupplierForm(id); }
function deleteSupplier(id){
  const s=supplierById(id); if(!s) return;
  if(!confirm('Delete supplier '+s.name+'?')) return;
  STATE.suppliers=(STATE.suppliers||[]).filter(x=>x.id!==id);
  Object.keys(STATE.itemSupplier||{}).forEach(k=>{ if(STATE.itemSupplier[k]===id) delete STATE.itemSupplier[k]; });
  saveState(); if(typeof pushState==='function') pushState(); renderSuppliers();
}
function addSupItem(sid){
  const s=supplierById(sid); if(!s) return;
  const key=$('#si-key-'+sid).value;
  const pack=Math.max(1,parseInt($('#si-pack-'+sid).value)||1);
  const min=Math.max(0,parseInt($('#si-min-'+sid).value)||0);
  s.items=s.items||[];
  if(s.items.some(it=>it.key===key)){ toast('Already listed for this supplier'); return; }
  const u=((($('#si-uom-'+sid)||{}).value)||'').trim(); if(u){ STATE.uom=STATE.uom||{}; STATE.uom[key]=u; }
  s.items.push({key, packSize:pack, minOrder:min});
  saveState(); if(typeof pushState==='function') pushState(); renderSuppliers(); toast(supplyName(key)+' added');
}
function editSupItem(sid,key){
  const s=supplierById(sid); if(!s) return;
  const it=(s.items||[]).find(i=>i.key===key); if(!it) return;
  const pack=prompt('Pack size (orders round up to this increment):', it.packSize||1); if(pack!==null && parseInt(pack)>0) it.packSize=parseInt(pack);
  const min=prompt('Minimum order quantity:', it.minOrder||0); if(min!==null && parseInt(min)>=0) it.minOrder=parseInt(min);
  saveState(); if(typeof pushState==='function') pushState(); renderSuppliers();
}
function removeSupItem(sid,key){
  const s=supplierById(sid); if(!s) return;
  s.items=(s.items||[]).filter(i=>i.key!==key);
  saveState(); if(typeof pushState==='function') pushState(); renderSuppliers();
}

function renderTeam(){
  const roster=(STATE.roster||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));
  const rows=roster.map(w=>`<tr>
    <td><strong>${w.name}</strong></td>
    <td class="right" style="font-family:monospace">${w.pin||'<span style="color:#b3261e">none</span>'}</td>
    <td>${w.mgr?'<span class="pill ready">manager</span>':'<span class="muted">worker</span>'}</td>
    <td>${w.cardId?'card ✓':'<span class="muted">no card</span>'}</td>
    <td class="right">
      <button class="btn sm ghost" onclick="teamEdit('${w.id}')">Edit</button>
      <button class="btn sm ghost" onclick="teamToggleMgr('${w.id}')">${w.mgr?'Unset mgr':'Make mgr'}</button>
      <button class="btn sm ghost" onclick="teamRemove('${w.id}')">Delete</button>
    </td></tr>`).join('');
  $('#view-team').innerHTML=`
    <div class="page-head"><div><h2>Team</h2><p>Add your workers and managers and set their PINs. They sign in on the workshop tablet with their name + PIN (or NFC card). Managers can unlock manager tools on the tablet.</p></div></div>
    <div class="card"><h3>Add a person</h3>
      <div class="row" style="gap:8px;align-items:flex-end">
        <label class="fld" style="flex:2"><span>Name</span><input id="tm_name" placeholder="e.g. Rose Costorio"></label>
        <label class="fld" style="flex:1"><span>PIN (4–6 digits)</span><input id="tm_pin" inputmode="numeric" maxlength="6" placeholder="1234"></label>
        <label class="fld" style="flex:0;white-space:nowrap"><span>Manager?</span><input id="tm_mgr" type="checkbox" style="width:20px;height:20px"></label>
        <button class="btn gold" onclick="teamAdd()">+ Add</button>
      </div>
    </div>
    <div class="card"><h3>People <span class="muted">(${roster.length})</span></h3>
      ${roster.length?`<table><thead><tr><th>Name</th><th class="right">PIN</th><th>Role</th><th>Card</th><th class="right"></th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty"><div class="big">◇</div>No one yet — add your first person above.</div>`}
      <p class="muted" style="margin-top:8px">NFC cards are linked on the workshop tablet (login screen → “Link a card”), since scanning needs the tablet.</p>
    </div>`;
}
function teamAdd(){
  const name=($('#tm_name').value||'').trim(); const pin=($('#tm_pin').value||'').trim(); const mgr=$('#tm_mgr').checked;
  if(!name){ toast('Enter a name'); return; }
  if(!/^\d{4,6}$/.test(pin)){ toast('PIN must be 4–6 digits'); return; }
  if((STATE.roster||[]).some(w=>w.name.toLowerCase()===name.toLowerCase())){ toast('That name already exists'); return; }
  STATE.roster=STATE.roster||[]; STATE.roster.push({id:uid(),name,pin,cardId:'',mgr:!!mgr});
  saveState(); if(typeof pushState==='function') pushState(); renderTeam(); toast(name+' added');
}
function teamEdit(id){
  const w=(STATE.roster||[]).find(x=>x.id===id); if(!w) return;
  const name=prompt('Name:', w.name); if(name===null) return;
  const pin=prompt('PIN (4–6 digits):', w.pin||''); if(pin===null) return;
  if(name.trim()) w.name=name.trim();
  if(/^\d{4,6}$/.test((pin||'').trim())) w.pin=pin.trim(); else if((pin||'').trim()!=='') toast('PIN unchanged — must be 4–6 digits');
  saveState(); if(typeof pushState==='function') pushState(); renderTeam();
}
function teamToggleMgr(id){
  const w=(STATE.roster||[]).find(x=>x.id===id); if(!w) return;
  if(!w.mgr && !/^\d{4,6}$/.test(String(w.pin||''))){ toast('Set a 4–6 digit PIN first'); return; }
  w.mgr=!w.mgr; saveState(); if(typeof pushState==='function') pushState(); renderTeam(); toast(w.name+(w.mgr?' is now a manager':' is no longer a manager'));
}
function teamRemove(id){
  const w=(STATE.roster||[]).find(x=>x.id===id); if(!w) return;
  if(!confirm('Remove '+w.name+'?')) return;
  STATE.roster=(STATE.roster||[]).filter(x=>x.id!==id);
  saveState(); if(typeof pushState==='function') pushState(); renderTeam();
}

      <button class="btn" style="background:var(--bad);color:#fff" onclick="dangerReset()">Delete all jobs</button>

/* ============================================================
   ROLE + TABS
   ============================================================ */
const TABS = [
  {id:'dash', label:'Dashboard', owner:true},
  {id:'work', label:'Work in progress', owner:true},
  {id:'orders', label:'Orders'},
  {id:'prod', label:'Production'},
  {id:'inv', label:'Inventory'},
  {id:'curing', label:'Curing'},
  {id:'ship', label:'Shipments'},
  {id:'team', label:'Team', owner:true},
  {id:'suppliers', label:'Suppliers', owner:true},
  {id:'restock', label:'Restock', owner:true},
  {id:'settings', label:'Settings', owner:true},
];
function setRole(r){
  ROLE=r; document.body.dataset.role=r;
  $('#roleOwner').classList.toggle('active',r==='owner');
  $('#roleProd').classList.toggle('active',r==='prod');
  renderTabs();
  // if production role lands on an owner-only tab, bounce to make list
  if(r==='prod' && CURRENT_TAB==='dash') switchTab('prod');
  else switchTab(CURRENT_TAB);
}
function renderTabs(){
  const openOrders = STATE.orders.filter(o=>o.status!=='shipped').length;
  const ready = STATE.batches.filter(b=>b.status==='ready').length;
  if(typeof checkReorder==='function') checkReorder();
  const c = {orders:openOrders, prod:(typeof totalBatchesNeeded==='function'?totalBatchesNeeded():0), curing:STATE.batches.filter(b=>b.status==='cure').length, ship:ready, restock:(STATE.restock||[]).length};
  $('#tabs').innerHTML = TABS.filter(t=>!(t.owner && ROLE!=='owner')).map(t=>{
    const badge = c[t.id]? `<span class="badge">${c[t.id]}</span>`:'';
    return `<button class="${t.id===CURRENT_TAB?'active':''}" onclick="switchTab('${t.id}')">${t.label}${badge}</button>`;
  }).join('');
}
function switchTab(id){
  CURRENT_TAB=id;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const v=$('#view-'+id); if(v) v.classList.add('active');
  renderTabs();
  ({dash:renderDash,orders:renderOrders,make:renderProd,prod:renderProd,curing:(typeof renderCuring==='function'?renderCuring:()=>{}),
    inv:renderInv,ship:renderShip,team:(typeof renderTeam==='function'?renderTeam:()=>{}),suppliers:(typeof renderSuppliers==='function'?renderSuppliers:()=>{}),restock:(typeof renderRestock==='function'?renderRestock:()=>{}),work:(typeof renderWork==='function'?renderWork:()=>{}),settings:(typeof renderSettings==='function'?renderSettings:()=>{})}[id]||(()=>{}))();
}
