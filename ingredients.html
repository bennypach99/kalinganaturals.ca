<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ingredients — Kalinga Naturals</title>
<style>
  :root{ --navy:#1A3A5C; --gold:#D4A853; --teal:#4A9D8F; --cream:#F8F4EE; --ink:#1A1A2E; --grey:#6B6B6B; --line:#e7e2d8; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--cream); color:var(--ink); line-height:1.55; padding:0 0 40px; }
  .top{ background:var(--navy); color:#fff; text-align:center; padding:22px 18px; }
  .top img{ height:60px; margin-bottom:6px; }
  .brand{ font-family:Georgia,serif; font-size:22px; font-weight:700; letter-spacing:.5px; }
  .tag{ font-family:Georgia,serif; font-style:italic; color:var(--gold); font-size:13px; margin-top:2px; }
  .wrap{ max-width:560px; margin:0 auto; padding:18px; }
  .card{ background:#fff; border-radius:14px; box-shadow:0 2px 14px rgba(0,0,0,.06); padding:22px; margin-top:16px; }
  h1{ font-family:Georgia,serif; color:var(--navy); font-size:24px; line-height:1.2; }
  .fr{ color:var(--teal); font-style:italic; font-weight:500; }
  .meta{ color:var(--grey); font-size:13px; margin-top:6px; text-transform:uppercase; letter-spacing:.5px; }
  h2{ font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin:18px 0 6px; }
  h2:first-of-type{ margin-top:0; }
  .inci{ font-size:14.5px; color:#333; }
  .inci .allergen{ color:var(--grey); font-style:italic; font-size:12.5px; display:block; margin-top:6px; }
  .pick a{ display:block; padding:11px 14px; border:1px solid var(--line); border-radius:10px; margin-top:8px; text-decoration:none; color:var(--navy); font-weight:600; }
  .foot{ text-align:center; color:var(--grey); font-size:12px; margin-top:22px; line-height:1.7; }
  .foot a{ color:var(--teal); }
</style>
</head>
<body>
<div class="top">
  <img src="images/logo-stacked.png" alt="Kalinga Naturals" onerror="this.style.display='none'">
  <div class="brand">KALINGA NATURALS</div>
  <div class="tag">Clean Hands. Kind hearts.</div>
</div>
<div class="wrap" id="content"></div>

<script>
const DIR_EN="Lather with warm water, apply to skin, rinse. For external use only.";
const DIR_FR="Faire mousser avec de l'eau tiède, appliquer sur la peau, rincer. Pour usage externe seulement.";
const CAU_EN="Avoid contact with eyes. Discontinue if irritation occurs.";
const CAU_FR="Éviter le contact avec les yeux. Cesser l'utilisation en cas d'irritation.";
const PRODUCTS={
  calamansi:{ name:"Calamansi Brightening Bar", fr:"Savon Éclaircissant au Calamansi", type:"Cold-process soap", net:"100 g",
    ing:"Cocos nucifera (coconut) oil, Aqua, Sodium hydroxide, Citrus microcarpa (calamansi) extract, Cocos nucifera (coconut) milk, Olea europaea (olive) fruit oil, Ricinus communis (castor) seed oil, Cymbopogon flexuosus (lemongrass) oil, Citral*, Limonene*, Geraniol*." },
  coconut:{ name:"Virgin Coconut & Lemongrass", fr:"Noix de Coco Vierge & Citronnelle", type:"Cold-process soap", net:"100 g",
    ing:"Cocos nucifera (coconut) oil, Aqua, Sodium hydroxide, Ricinus communis (castor) seed oil, Cymbopogon flexuosus (lemongrass) oil, Citral*, Limonene*, Geraniol*." },
  moringa:{ name:"Moringa & Coconut Milk", fr:"Moringa & Lait de Coco", type:"Cold-process soap", net:"100 g",
    ing:"Cocos nucifera (coconut) oil, Aqua, Sodium hydroxide, Cocos nucifera (coconut) milk, Canarium ovatum (pili) seed oil, Moringa oleifera leaf powder, Olea europaea (olive) fruit oil, Linalool*, Limonene*." },
  charcoal:{ name:"Charcoal & Lemongrass Detox", fr:"Charbon & Citronnelle Détox", type:"Cold-process soap", net:"100 g",
    ing:"Cocos nucifera (coconut) oil, Aqua, Sodium hydroxide, Charcoal powder, Cymbopogon flexuosus (lemongrass) oil, Mentha piperita (peppermint) oil, Citral*, Limonene*, Menthol*." },
  shampoo:{ name:"Ylang-Ylang Shampoo Bar", fr:"Barre de Shampooing à l'Ylang-Ylang", type:"Shampoo bar", net:"80 g",
    ing:"Sodium cocoyl isethionate, Cocos nucifera (coconut) oil, Aqua, Cananga odorata (ylang-ylang) flower oil, Ricinus communis (castor) seed oil, Butyrospermum parkii (shea) butter, Benzyl benzoate*, Benzyl salicylate*, Linalool*, Geraniol*." },
  teatree:{ name:"Tea Tree Clarifying Shampoo", fr:"Barre de Shampooing Clarifiant à l'Arbre à Thé", type:"Shampoo bar", net:"80 g",
    ing:"Sodium cocoyl isethionate, Cocos nucifera (coconut) oil, Aqua, Ricinus communis (castor) seed oil, Butyrospermum parkii (shea) butter, Melaleuca alternifolia (tea tree) leaf oil, Mentha piperita (peppermint) oil, Limonene*, Menthol*." },
  cocoshampoo:{ name:"Coconut Lemongrass Shampoo", fr:"Barre de Shampooing Coco & Citronnelle", type:"Shampoo bar", net:"80 g",
    ing:"Sodium cocoyl isethionate, Cocos nucifera (coconut) oil, Aqua, Ricinus communis (castor) seed oil, Butyrospermum parkii (shea) butter, Cymbopogon flexuosus (lemongrass) oil, Citral*, Limonene*, Geraniol*." },
  charcoalshampoo:{ name:"Charcoal Detox Shampoo", fr:"Barre de Shampooing Détox au Charbon", type:"Shampoo bar", net:"80 g",
    ing:"Sodium cocoyl isethionate, Cocos nucifera (coconut) oil, Aqua, Ricinus communis (castor) seed oil, Butyrospermum parkii (shea) butter, Charcoal powder, Melaleuca alternifolia (tea tree) leaf oil, Mentha piperita (peppermint) oil, Limonene*, Menthol*." }
};
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function getKey(){ const p=new URLSearchParams(location.search).get('p'); return (p&&PRODUCTS[p])?p:null; }
function render(){
  const k=getKey(), el=document.getElementById('content');
  if(!k){
    el.innerHTML='<div class="card"><h1>Our ingredients</h1><p class="meta">Choose a product</p>'+
      '<div class="pick">'+Object.entries(PRODUCTS).map(([key,p])=>`<a href="?p=${key}">${esc(p.name)} →</a>`).join('')+'</div></div>'+
      foot();
    return;
  }
  const p=PRODUCTS[k];
  const inci=esc(p.ing).replace(/\*$/,'').trim();
  el.innerHTML=`<div class="card">
    <h1>${esc(p.name)}<br><span class="fr">${esc(p.fr)}</span></h1>
    <div class="meta">${esc(p.type)} · Net wt ${esc(p.net)} · Handcrafted in the Philippines</div>
    <h2>Ingredients / Ingrédients (INCI)</h2>
    <p class="inci">${inci}<span class="allergen">*Naturally occurring in essential oils. / Naturellement présents dans les huiles essentielles.</span></p>
    <h2>Directions / Mode d'emploi</h2>
    <p>${esc(DIR_EN)}<br><span class="fr">${esc(DIR_FR)}</span></p>
    <h2>Caution / Attention</h2>
    <p>${esc(CAU_EN)}<br><span class="fr">${esc(CAU_FR)}</span></p>
  </div>`+foot();
}
function foot(){
  return `<div class="foot"><strong>Kalinga Naturals</strong><br>
    5210 Appleby Line, Burlington, ON L7M 0P5<br>
    <a href="https://kalinganaturals.ca">kalinganaturals.ca</a> · info@kalinganaturals.ca<br>
    <a href="https://kalinganaturals.ca">← Back to shop</a></div>`;
}
render();
</script>
</body>
</html>
