<style>

    --navy:#1A3A5C; --navy-d:#12293f; --gold:#D4A853; --gold-d:#b8902f;
    --teal:#4A9D8F; --teal-d:#3a8275; --cream:#F8F4EE; --cream-d:#efe9dd;
    --ink:#1A1A2E; --grey:#6b7280; --line:#e3ddd0;
    --ok:#2E7D32; --ok-bg:#E8F5E9; --warn:#B8860B; --warn-bg:#FFF8E1;
    --bad:#C62828; --bad-bg:#FDECEA; --white:#fff;

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--cream);color:var(--ink);line-height:1.5;font-size:14px}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;font-weight:700;letter-spacing:-.01em}
  /* ── Top bar ── */
  .topbar{background:var(--navy);color:#fff;padding:0 18px;display:flex;align-items:center;
    gap:16px;height:58px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:10px;font-family:Georgia,serif;font-weight:700;font-size:17px}
  .brand .dot{width:10px;height:10px;background:var(--gold);transform:rotate(45deg);flex:none}
  .brand small{display:block;font-family:-apple-system,sans-serif;font-weight:400;
    font-size:10px;letter-spacing:2px;color:var(--teal);margin-top:-2px}
  .role-switch{margin-left:auto;display:flex;background:var(--navy-d);border-radius:8px;padding:3px;gap:2px}
  .role-switch button{background:none;border:none;color:#9db3c7;font-size:12px;font-weight:600;
    padding:7px 14px;border-radius:6px;cursor:pointer;font-family:inherit}
  .role-switch button.active{background:var(--gold);color:var(--navy)}
  .fx{font-size:11px;color:#9db3c7;display:flex;align-items:center;gap:6px}
  .fx input{width:48px;background:var(--navy-d);border:1px solid #2d4d6b;color:#fff;
    border-radius:5px;padding:3px 5px;font-size:11px;text-align:right}
  /* ── Tabs ── */
  .tabs{background:var(--white);border-bottom:1px solid var(--line);padding:0 18px;
    display:flex;gap:2px;position:sticky;top:58px;z-index:40;overflow-x:auto}
  .tabs button{background:none;border:none;border-bottom:3px solid transparent;
    padding:13px 16px;font-size:13px;font-weight:600;color:var(--grey);cursor:pointer;
    font-family:inherit;white-space:nowrap}
  .tabs button.active{color:var(--navy);border-bottom-color:var(--gold)}
  .tabs button .badge{background:var(--bad);color:#fff;border-radius:10px;font-size:10px;
    padding:1px 6px;margin-left:5px;vertical-align:middle}
  /* ── Layout ── */
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 60px}
  .view{display:none}.view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .page-head h2{font-size:23px;color:var(--navy)}
  .page-head p{color:var(--grey);font-size:13px;margin-top:2px}
  /* ── Cards & grid ── */
  .card{background:var(--white);border:1px solid var(--line);border-radius:12px;
    padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .card h3{font-size:16px;color:var(--navy);margin-bottom:12px}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  /* ── Stat ── */
  .stat{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px;
    box-shadow:var(--shadow)}
  .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);font-weight:600}
  .stat .val{font-size:26px;font-weight:700;font-family:Georgia,serif;color:var(--navy);margin-top:4px}
  .stat .sub{font-size:11px;color:var(--grey);margin-top:2px}
  .stat.gold{border-top:3px solid var(--gold)}
  .stat.teal{border-top:3px solid var(--teal)}
  .stat.navy{border-top:3px solid var(--navy)}
  .stat.ok .val{color:var(--ok)} .stat.bad .val{color:var(--bad)}
  /* ── Forms ── */
  label.fld{display:block;margin-bottom:10px}
  label.fld span{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:4px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-size:14px;font-family:inherit;background:var(--white);color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(212,168,83,.15)}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:120px}
  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;
    border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;transition:filter .15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.gold{background:var(--gold);color:var(--navy)}
  .btn.teal{background:var(--teal)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--navy)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.danger{background:var(--bad)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  /* ── Table ── */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--grey);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--cream)}
  /* ── Pills ── */
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pill.new{background:var(--warn-bg);color:var(--warn)}
  .pill.make{background:#E3F2FD;color:#1565C0}
  .pill.cure{background:#F3E5F5;color:#7B1FA2}
  .pill.ready{background:var(--ok-bg);color:var(--ok)}
  .pill.ship{background:var(--cream-d);color:var(--grey)}
  /* ── Misc ── */
  .empty{text-align:center;padding:46px 20px;color:var(--grey)}
  .empty .big{font-size:40px;margin-bottom:8px;opacity:.5}
  .muted{color:var(--grey);font-size:12px}
  .right{text-align:right}.center{text-align:center}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);
    color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;
    box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.show{opacity:1}
  .owner-only,.prod-only{display:none}
  body[data-role="owner"] .owner-only{display:block}
  body[data-role="owner"] .owner-only.flex{display:flex}
  body[data-role="prod"] .prod-only{display:block}
  /* ── Timer ── */
  .timer-box{background:var(--navy);color:#fff;border-radius:12px;padding:20px;text-align:center}
  .timer-box .time{font-family:Georgia,serif;font-size:46px;font-weight:700;letter-spacing:2px}
  .timer-box .step{color:var(--gold);font-size:13px;font-weight:600;margin-bottom:6px}
  .step-list{list-style:none}
  .step-list li{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .step-list li .n{flex:none;width:24px;height:24px;background:var(--teal);color:#fff;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .low{color:var(--bad);font-weight:700}
  @media print{
    .topbar,.tabs,.no-print{display:none!important}
    .view{display:none!important}.view.print-active{display:block!important}
    body{background:#fff}.card{box-shadow:none;border:1px solid #ccc}
  }
.cmodal{position:fixed;inset:0;background:rgba(20,30,40,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}

  .pm{position:fixed;inset:0;z-index:520;background:rgba(20,30,40,.6);display:flex;align-items:center;justify-content:center;padding:20px}
  .pm-box{background:#fff;border-radius:12px;padding:26px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
</style>

    const ord=assigned[pk]||0, stk=made[pk]||0, avail=stk-ord;
    const target=ord;
    const inFlight=(STATE.batches||[]).filter(b=>b.product===pk && b.status!=='shipped' && !b.orderId).length*BATCH_SIZE;
    const toCreate = (stk+inFlight)<target ? Math.ceil((target-stk-inFlight)/BATCH_SIZE) : 0;
    if(ord===0 && stk===0 && toCreate===0) return '';
    if(toCreate>0) queue.push({pk, n:toCreate, urgent: stk<ord, short: Math.max(0,ord-stk)});
    return `<tr><td><strong>${PRODUCTS[pk].name.replace(' Bar','')}</strong></td>
      <td class="right">${ord}</td><td class="right">${stk}</td>
      <td class="right ${avail<0?'low':''}">${avail}${avail<0?' ⚠':''}</td></tr>`;
  }).join('');
  queue.sort((a,b)=> (b.urgent-a.urgent) || (b.short-a.short));
  const qrows=queue.map(x=>`<tr>
      <td><strong>${PRODUCTS[x.pk].name.replace(' Bar','')}</strong></td>
      <td>${x.urgent?`<span class="pill new">order short ${x.short}</span>`:`<span class="pill make">restock</span>`}</td>
      <td class="right">${x.n} batch${x.n>1?'es':''} × ${BATCH_SIZE}</td>
      <td class="right no-print"><button class="btn sm teal" onclick="createStockBatch('${x.pk}')">+ Create batch</button></td></tr>`).join('');
  $('#view-orders').innerHTML=`
    <div class="page-head"><div>
      <h2>Received Orders</h2>
      <p>${nextShip?`Next shipment to Canada: <strong>${nextShip}</strong>`:'Orders received from the website, summarised by bar.'}</p>
    </div></div>
    <div class="card">
      <h3>Bars ordered vs stock <span class="muted">(${open.length} order${open.length===1?'':'s'})</span></h3>
      ${rows?`<table><thead><tr><th>Bar</th><th class="right">Ordered</th><th class="right">Made</th><th class="right">Available</th></tr></thead><tbody>${rows}</tbody></table>`
        :`<div class="empty"><div class="big">◇</div>No orders received yet.</div>`}
    </div>
    ${queue.length?`<div class="card"><h3>Batches to make <span class="muted">(priority order)</span></h3>
      <table><thead><tr><th>Bar</th><th>Reason</th><th class="right">Make</th><th class="no-print"></th></tr></thead><tbody>${qrows}</tbody></table>
      <p class="muted" style="margin-top:8px">Order shortfalls first, then restock to keep ${RESTOCK_BELOW}+ of each on hand. Each batch makes ${BATCH_SIZE} bars.</p></div>`:''}`;
}
function addOrder(){
  const gv=id=>{const e=$('#'+id);return e?e.value.trim():'';};
  const customer=(gv('ord_first')+' '+gv('ord_last')).trim();
  if(!customer){toast('Enter a customer name');return;}
  const items={};let any=false;
  PROD_KEYS.forEach(pk=>{const q=parseInt($('#ord_'+pk).value)||0;if(q>0){items[pk]=q;any=true;}});
  if(!any){toast('Add at least one product');return;}
  const lines=[gv('ord_street'),gv('ord_line2'),gv('ord_city'),(gv('ord_prov')+' '+gv('ord_postal')).trim(),gv('ord_country')].filter(Boolean);
  if(gv('ord_phone')) lines.push('Tel: '+gv('ord_phone'));
  const order={id:'web-'+uid(),customer,email:gv('ord_email'),phone:gv('ord_phone'),
    address:lines.join(', '),items,status:'new',created:today(),shipped:null,agreedTotal:gv('ord_agreed')||null};
  STATE.orders.push(order);
  if(gv('ord_shipby')){STATE.shipDates=STATE.shipDates||{};STATE.shipDates[order.id]=gv('ord_shipby');}
  pushOrderToBackend(order);   // manual/phone/market orders persist to the DB too
  saveState();toast('Order added');renderOrders();renderTabs();
}
function setShipDate(id){
  STATE.shipDates=STATE.shipDates||{};
  const cur=STATE.shipDates[id]||'';
  const d=prompt('Ship-by date (YYYY-MM-DD), leave blank to clear:', cur);
  if(d===null) return;
  if(d.trim()===''){ delete STATE.shipDates[id]; } else { STATE.shipDates[id]=d.trim(); }
  saveState(); renderOrders(); renderTabs();
}
function queueOrder(id){
  const o=STATE.orders.find(x=>x.id===id);if(!o)return;
  o.status='make';
  patchOrderOnBackend(id,{status:'make'});   // keep server in sync
  // create/merge batches per product
  Object.entries(o.items).forEach(([pk,q])=>{
    STATE.batches.push({id:uid(),num:batchNum(),product:pk,qty:q,status:'make',orderId:id,
      started:null,curedAt:null,madeBy:'',minutes:0,created:today()});
  });
  saveState();toast('Queued to make list');renderOrders();renderTabs();
}
function delOrder(id){
  if(!confirm('Delete this order?'))return;
  STATE.orders=STATE.orders.filter(o=>o.id!==id);
  STATE.batches=STATE.batches.filter(b=>b.orderId!==id);
  const s=loadSync(); if(s.deleted.indexOf(id)===-1){s.deleted.push(id);saveSync(s);}
  saveState();renderOrders();renderTabs();
}

/* ============================================================
   MAKE LIST  (aggregated demand)
   ============================================================ */
function neededBatches(){ return STATE.batches.filter(b=>b.status==='make'); }
function renderMake(){
  // aggregate make demand by product
  const agg={};
  STATE.batches.filter(b=>b.status==='make').forEach(b=>{agg[b.product]=(agg[b.product]||0)+b.qty;});
  const curing=STATE.batches.filter(b=>b.status==='cure');
  // total grams of each ingredient reserved by everything currently queued to make
  const reservedAll={};
  STATE.batches.filter(b=>b.status==='make').forEach(b=>{
    PRODUCTS[b.product].ingredients.forEach(i=>{reservedAll[i.key]=(reservedAll[i.key]||0)+i.grams*b.qty;});
  });
  const cards=Object.entries(agg).map(([pk,qty])=>{
    // requirements; availability = on-hand minus what OTHER queued batches reserved
    const reqs=PRODUCTS[pk].ingredients.map(i=>{
      const need=i.grams*qty, have=STATE.inventory[i.key]||0, avail=have-((reservedAll[i.key]||0)-need);
      return {name:i.name,need,have,avail,short:avail<need};
    });
    const canMake=reqs.every(r=>!r.short);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><h3 style="margin-bottom:2px">${PRODUCTS[pk].name}</h3>
          <div class="muted">${qty} bars to make · cure ${PRODUCTS[pk].cure} days</div></div>
        <span class="pill make">${qty}</span>
      </div>
      <div class="divider"></div>
      <table><thead><tr><th>Ingredient</th><th class="right">Need</th><th class="right">Have</th><th class="right">Avail</th></tr></thead>
        <tbody>${reqs.map(r=>`<tr><td>${r.name}</td><td class="right">${r.need} g</td>
          <td class="right">${r.have} g</td><td class="right ${r.short?'low':''}">${r.avail} g${r.short?' ⚠':''}</td></tr>`).join('')}</tbody></table>
      ${canMake?'':`<p class="muted" style="color:var(--bad);margin-top:8px">Not enough stock — log a delivery in Inventory.</p>`}
      <button class="btn teal" style="margin-top:12px" onclick="startMaking('${pk}')">Start making → Production</button>
    </div>`;
  }).join('');

  $('#view-make').innerHTML=`
    <div class="page-head"><div>
      <h2>Make List</h2><p>Everything queued from orders, grouped by product. Check stock, then start making.</p>
    </div></div>
    ${Object.keys(agg).length?`<div class="grid g2">${cards}</div>`:
      `<div class="card"><div class="empty"><div class="big">◇</div>Nothing queued. Queue orders from the Orders tab.</div></div>`}
    ${curing.length?`<div class="card"><h3>Curing now (${curing.length} batches)</h3>
      <table><thead><tr><th>Product</th><th class="right">Qty</th><th>Started</th><th>Cure progress</th><th class="no-print"></th></tr></thead>
      <tbody>${curing.map(b=>{
        const d=daysSince(b.curedAt||b.started||b.created),total=PRODUCTS[b.product].cure;
        const pct=Math.min(100,Math.round(d/total*100)),done=d>=total;
        return `<tr><td>${PRODUCTS[b.product].name}</td><td class="right">${b.qty}</td>
          <td>${b.curedAt||'—'}</td>
          <td><div style="background:var(--cream-d);border-radius:6px;height:8px;width:120px;overflow:hidden">
            <div style="background:${done?'var(--ok)':'var(--teal)'};height:100%;width:${pct}%"></div></div>
            <span class="muted">${d}/${total} days</span></td>
          <td class="no-print"><button class="btn sm ghost" onclick="backToMake('${b.id}')">← Back</button>${done?`<button class="btn sm gold" onclick="markReady('${b.id}')">Mark ready</button>`:''}</td></tr>`;
      }).join('')}</tbody></table></div>`:''}
    ${(function(){const ready=STATE.batches.filter(b=>b.status==='ready');return ready.length?`<div class="card"><h3>Ready to ship (${ready.length} batches)</h3><table><thead><tr><th>Product</th><th class="right">Qty</th><th>Made by</th><th class="no-print"></th></tr></thead><tbody>${ready.map(b=>`<tr><td>${PRODUCTS[b.product].name}</td><td class="right">${b.qty}</td><td>${b.madeBy||'—'}</td><td class="no-print"><button class="btn sm ghost" onclick="backReady('${b.id}')">← Back to cure</button></td></tr>`).join('')}</tbody></table></div>`:'';})()}`;
}
function startMaking(pk){ PRODUCTION_FOCUS=pk; switchTab('prod'); }
// ---- Back (reverse a stage). Rule: Back = previous stage, Delete = gone for good. ----
function backOrder(id){
  const o=STATE.orders.find(x=>x.id===id);if(!o)return;
  if(!confirm('Move this order back to New? Its queued batches will be removed.'))return;

function backToMake(id){

}
function backReady(id){

function unshipOrder(id){

function markReady(id){

let PRODUCTION_FOCUS=null;
let TIMER={int:null,remain:0,stepIndex:-1,product:null};
const SETUP_STEPS=[
  "Confirm you're punched in. Put on PPE — goggles, gloves, apron.",
  "Sanitize the workspace and all tools.",
  "Gather and weigh the oils and additives for this batch.",
  "Set up the lye station with ventilation; measure lye and distilled water.",
  "Chill any milk or liquid ingredients the recipe calls for."
];
const CLEANUP_STEPS=[
  "Neutralize and rinse all lye-contact tools (vinegar, then water).",
  "Wash, rinse, and dry all equipment and moulds.",
  "Wipe down and sanitize the workspace.",
  "Label the batch: name, batch #, pour date, cure-ready date.",
  "Place on the assigned curing rack and note the rack number."
];
let WIZARD=null, WIZ_TICK=null;
function wizPhases(){
  const mk=(PRODUCTS[WIZARD.product].steps||[]).map(s=>s.t);
  return [["Setup",SETUP_STEPS],["Make · "+PRODUCTS[WIZARD.product].name,mk],["Cleanup",CLEANUP_STEPS]];
}
function startWizard(batchId){
  const b=STATE.batches.find(x=>x.id===batchId); if(!b) return;
  WIZARD={batchId, product:b.product, qty:b.qty, startedAt:Date.now(), phase:0, step:0, phaseStartAt:Date.now(), durations:{setup:0,make:0,cleanup:0}};
  if(WIZ_TICK) clearInterval(WIZ_TICK); WIZ_TICK=setInterval(wizTick,1000);
  renderProd();
}
function mmss(ms){ const s=Math.max(0,Math.floor(ms/1000)); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function wizTick(){
  if(!WIZARD) return;
  const t=document.getElementById('wizTotal'); if(t) t.textContent=mmss(Date.now()-WIZARD.startedAt);
  const p=document.getElementById('wizPhaseT'); if(p) p.textContent=mmss(Date.now()-WIZARD.phaseStartAt);
}
function wizDone(){
  if(!WIZARD) return;
  const steps=wizPhases()[WIZARD.phase][1];
  if(WIZARD.step < steps.length-1){ WIZARD.step++; renderProd(); return; }
  const name=["setup","make","cleanup"][WIZARD.phase];
  WIZARD.durations[name]=Math.round((Date.now()-WIZARD.phaseStartAt)/60000);
  if(WIZARD.phase<2){ WIZARD.phase++; WIZARD.step=0; WIZARD.phaseStartAt=Date.now(); renderProd(); }
  else { finishWizard(); }
}
function wizBack(){
  if(!WIZARD) return;
  if(WIZARD.step>0){ WIZARD.step--; }
  else if(WIZARD.phase>0){ WIZARD.phase--; WIZARD.step=wizPhases()[WIZARD.phase][1].length-1; }
  renderProd();
}
function wizCancel(){
  if(!confirm('Cancel this make? The time so far will be discarded.')) return;
  if(WIZ_TICK) clearInterval(WIZ_TICK); WIZ_TICK=null; WIZARD=null; renderProd();
}
function nextRack(){
  const used=new Set(STATE.batches.filter(b=>b.rack&&b.status!=='shipped').map(b=>b.rack));
  let n=1; while(used.has(n)) n++; return n;
}
function finishWizard(){
  const w=WIZARD; const b=STATE.batches.find(x=>x.id===w.batchId);
  const total=Math.round((Date.now()-w.startedAt)/60000);
  if(b){ b.status='cure'; b.curedAt=today(); b.started=today(); b.rack=nextRack();
    b.madeBy=(typeof ACTIVE!=='undefined'&&ACTIVE)?ACTIVE.name:(b.madeBy||'');
    b.minutes=total; b.setupMin=w.durations.setup; b.makeMin=w.durations.make; b.cleanupMin=w.durations.cleanup; }
  PRODUCTS[w.product].ingredients.forEach(i=>{ STATE.inventory[i.key]=Math.max(0,(STATE.inventory[i.key]||0)-i.grams*w.qty); });
  if(WIZ_TICK) clearInterval(WIZ_TICK); WIZ_TICK=null; WIZARD=null;
  saveState(); toast('Batch complete — '+total+' min. Now curing.'); renderProd(); renderTabs();
}
function renderProd(){
  if(WIZARD){ renderWizard(); return; }
  const makeB=STATE.batches.filter(b=>b.status==='make');
  const rows=makeB.map(b=>`<tr>
    <td><strong>${PRODUCTS[b.product].name.replace(' Bar','')}</strong></td>
    <td class="right">${b.qty} bars</td>
    <td class="right no-print"><button class="btn sm teal" onclick="startWizard('${b.id}')">▶ Start guided make</button></td></tr>`).join('');
  $('#view-prod').innerHTML=`
    <div class="page-head"><div>
      <h2>Production</h2><p>Pick a batch and follow the guided steps. Setup, making, and cleanup are timed automatically.</p>
    </div></div>
    <div class="card">
      <h3>Batches ready to make <span class="muted">(${makeB.length})</span></h3>
      ${makeB.length?`<table><thead><tr><th>Soap</th><th class="right">Batch</th><th class="no-print"></th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty"><div class="big">◇</div>No batches queued. Create one from the Received Orders tab.</div>`}
    </div>`;
}
function renderWizard(){
  const phases=wizPhases(); const steps=phases[WIZARD.phase][1]; const stepText=steps[WIZARD.step];
  const names=["Setup","Making","Cleanup"];
  const dots=names.map((n,i)=>`<span class="pill ${i===WIZARD.phase?'make':(i<WIZARD.phase?'ready':'new')}" style="margin-right:6px">${n}</span>`).join('');
  const isLast = WIZARD.phase===2 && WIZARD.step===steps.length-1;
  const backDis = WIZARD.phase===0 && WIZARD.step===0 ? 'disabled' : '';
  $('#view-prod').innerHTML=`
    <div class="page-head"><div>
      <h2>${phases[WIZARD.phase][0]}</h2><p>${PRODUCTS[WIZARD.product].name} · ${WIZARD.qty} bars &nbsp; ${dots}</p>
    </div></div>
    <div class="card" style="text-align:center">
      <div class="muted" style="font-size:13px;text-transform:uppercase;letter-spacing:1px">Step ${WIZARD.step+1} of ${steps.length}</div>
      <div style="font-size:22px;font-weight:600;color:var(--navy);margin:14px auto;max-width:640px;line-height:1.45">${stepText}</div>
      <div style="display:flex;gap:30px;justify-content:center;margin:18px 0">
        <div><div class="muted" style="font-size:11px;text-transform:uppercase">This phase</div><div id="wizPhaseT" style="font-family:Georgia,serif;font-size:42px;color:var(--teal);font-weight:700">00:00</div></div>
        <div><div class="muted" style="font-size:11px;text-transform:uppercase">Total</div><div id="wizTotal" style="font-family:Georgia,serif;font-size:42px;color:var(--navy);font-weight:700">00:00</div></div>
      </div>
      <p class="muted" style="font-size:11px">The timer runs automatically — it can't be paused or edited.</p>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
        <button class="btn ghost" onclick="wizBack()" ${backDis}>← Back</button>
        <button class="btn gold" style="min-width:170px" onclick="wizDone()">${isLast?'Finish — start curing':'Done — next step'}</button>
      </div>
      <button class="btn ghost sm no-print" style="margin-top:14px" onclick="wizCancel()">Cancel make</button>
    </div>`;
  wizTick();
}
function pickProd(pk){PRODUCTION_FOCUS=pk;renderProd();}
function loadTimer(stepIndex,secs){
  TIMER.remain=secs;TIMER.stepIndex=stepIndex;TIMER.product=PRODUCTION_FOCUS;
  if(TIMER.int){clearInterval(TIMER.int);TIMER.int=null;}
  $('#timerStep').textContent='Step '+(stepIndex+1);
  $('#timerStart').textContent='Start step timer';
  updateTimerDisplay();
}
function timerToggle(){
  if(TIMER.int){clearInterval(TIMER.int);TIMER.int=null;$('#timerStart').textContent='Resume';return;}
  if(TIMER.remain<=0){toast('Pick a step timer first');return;}
  $('#timerStart').textContent='Pause';
  TIMER.int=setInterval(()=>{
    TIMER.remain--;updateTimerDisplay();
    if(TIMER.remain<=0){clearInterval(TIMER.int);TIMER.int=null;
      $('#timerStart').textContent='Start step timer';
      try{new AudioContext();}catch(e){}
      toast('⏱ Step timer done!');
      $('#timerBox').style.background='var(--ok)';
      setTimeout(()=>$('#timerBox').style.background='',1500);
    }
  },1000);
}
function timerReset(){if(TIMER.int)clearInterval(TIMER.int);TIMER.int=null;TIMER.remain=0;
  TIMER.stepIndex=-1;$('#timerStep').textContent='Ready';$('#timerStart').textContent='Start step timer';updateTimerDisplay();}
function updateTimerDisplay(){
  const el=$('#timerTime');if(!el)return;
  const m=Math.floor(TIMER.remain/60),s=TIMER.remain%60;
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function logProduction(pk){
  const qty=parseInt($('#madeQty').value)||0;
  const by=$('#madeBy').value.trim();
  const min=parseInt($('#madeMin').value)||0;
  if(qty<1){toast('Enter quantity made');return;}
  // deduct inventory
  PRODUCTS[pk].ingredients.forEach(i=>{
    STATE.inventory[i.key]=Math.max(0,(STATE.inventory[i.key]||0)-i.grams*qty);
  });
  // move matching 'make' batches to 'cure', or create a stock batch
  const makeB=STATE.batches.filter(b=>b.status==='make'&&b.product===pk);
  if(makeB.length){ makeB.forEach(b=>{b.status='cure';b.curedAt=today();b.madeBy=by;b.minutes=min;}); }
  else { STATE.batches.push({id:uid(),num:batchNum(),product:pk,qty,status:'cure',orderId:null,
    started:today(),curedAt:today(),madeBy:by,minutes:min,created:today()}); }
  saveState();toast(`${qty} bars logged — now curing`);renderProd();renderTabs();
}

function mergeObj(base, mine, theirs){
  const bo=_isObj(base)?base:{}; const out={};
  const keys=[...new Set([...Object.keys(mine),...Object.keys(theirs)])];
  keys.forEach(k=>{ out[k]=merge3(bo[k], mine[k], theirs[k]); });
  return out;
}
function merge3(base, mine, theirs){
  if(theirs===undefined) return mine;
  if(mine===undefined) return theirs;
  if(_eq(mine,theirs)) return mine;
  if(_eq(mine,base)) return theirs;   // only the other device changed
  if(_eq(theirs,base)) return mine;    // only this device changed
  if(Array.isArray(mine)&&Array.isArray(theirs)) return mergeList(base,mine,theirs);
  if(_isObj(mine)&&_isObj(theirs)) return mergeObj(base,mine,theirs);
  return theirs;                       // scalar both changed -> remote wins (deterministic)
}
function mergeServer(sv){
  let changed=false;
  SYNC_AREAS.forEach(a=>{
    const base=_syncedSnap[a]!==undefined?JSON.parse(_syncedSnap[a]):undefined;
    const mine=STATE[a];
    const theirs=sv?sv[a]:undefined;
    if(theirs===undefined) return;
    const merged=merge3(base, mine, theirs);
    if(!_eq(merged, mine)){ STATE[a]=merged; changed=true; }
  });
  return changed;
}
async function fetchServerState(){
  try{ const r=await fetch(backendBase()+'/state',{headers:{'X-Kalinga-Token':BACKEND_READ_TOKEN,'X-Kalinga-Session':ADMIN_SESSION}});
    if(!r.ok) return null; const d=await r.json(); if(!d||!d.ok) return null; return d; }catch(e){ return null; }
}
async function pushState(){
  if(!BACKEND_URL || _pushing) return;
  _pushing=true;
  try{
    const d=await fetchServerState();
    const sv=d?d.value:null;
    mergeServer(sv);                       // fold in any remote changes first, then write the union
    const r=await fetch(backendBase()+'/state',{method:'PUT',headers:{'Content-Type':'application/json','X-Kalinga-Token':BACKEND_WRITE_TOKEN,'X-Kalinga-Session':ADMIN_SESSION},body:JSON.stringify({value:productionPayload()})});
    if(r.ok){ const rd=await r.json(); if(rd&&rd.ok){ stateVersion=rd.version; const s=loadSync(); s.stateVersion=stateVersion; saveSync(s); } }
    _syncedSnap=snapshot(); cacheLocal(); rerenderCurrent();
  }catch(e){} finally{ _pushing=false; }
}
async function pullState(){
  if(!BACKEND_URL || _pushing) return;
  const d=await fetchServerState();
  if(!d || !d.value) return;
  const changed=mergeServer(d.value);
  stateVersion=d.version;
  _syncedSnap=snapshot();
  if(changed){ cacheLocal(); rerenderCurrent(); }
}

function showConflict(areas, sv){
  _conflictCtx={areas:areas.slice(), sv:sv};
  const names={batches:'Production batches',inventory:'Inventory stock',deliveries:'Deliveries',ingredientCosts:'Ingredient costs',shipDates:'Delivery dates'};
  const li=areas.map(a=>`<li>${names[a]||a}</li>`).join('');
  const mEl=$('#conflictModal'); if(!mEl) return;
  mEl.innerHTML=`<div class="cbox"><h3 style="margin-top:0">Sync conflict</h3>
    <p class="muted">These changed here <b>and</b> on another device since the last sync:</p>
    <ul style="margin:8px 0 8px 18px">${li}</ul>
    <p class="muted">Choose which to keep — nothing is overwritten until you pick.</p>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn gold" onclick="resolveConflict('mine')">Keep mine</button>
      <button class="btn teal" onclick="resolveConflict('theirs')">Use other device</button></div></div>`;
  mEl.style.display='flex';
}
function resolveConflict(choice){
  const ctx=_conflictCtx; if(!ctx) return;
  ctx.areas.forEach(a=>{
    const theirs = ctx.sv && ctx.sv[a]!==undefined ? ctx.sv[a] : undefined;
    if(choice==='theirs' && theirs!==undefined){ STATE[a]=theirs; }
    _syncedSnap[a]=JSON.stringify(theirs!==undefined?theirs:STATE[a]);
  });
  _conflictCtx=null; const mEl=$('#conflictModal'); if(mEl) mEl.style.display='none';
  cacheLocal(); rerenderCurrent(); pushState();
}

function startBackendSync(){
  if(!BACKEND_URL) return;
  _syncedSnap = snapshot();
  pollBackend(); pullState();
  setInterval(()=>{ pollBackend(); pullState(); }, POLL_MS);
}

let ACTIVE=null, nfcReader=null, nfcActive=false;
function tickClock(){
  const d=new Date();
  const c=document.getElementById('loginClock'); if(c) c.textContent=d.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  const dt=document.getElementById('loginDate'); if(dt) dt.textContent=d.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(tickClock,1000); tickClock();
async function activateReader(){
  if(ACTIVE) return;
  if(nfcActive){ return; }
  if(!('NDEFReader' in window)){ const p=document.getElementById('loginPrompt'); if(p) p.textContent='No NFC on this device — use “Sign in manually”.'; return; }
  try{
    nfcReader=new NDEFReader(); await nfcReader.scan(); nfcActive=true;
    nfcReader.onreading=(e)=>handleCard(e.serialNumber||('id-'+Date.now()));
    const p=document.getElementById('loginPrompt'); if(p) p.textContent='Reader active — scan your card to start';
  }catch(err){ const p=document.getElementById('loginPrompt'); if(p) p.textContent='Could not start the card reader — tap to retry.'; }
}
function handleCard(cardId){
  if(!cardId) return;
  if(ACTIVE){
    const pm=document.getElementById('punchModal');
    if(pm && pm.style.display!=='none') confirmPunchOut();
    return;
  }
  let name=(STATE.workers||{})[cardId];
  if(!name){
    name=prompt('New card. Enter the worker\'s name:');
    if(!name||!name.trim()) return;
    STATE.workers=STATE.workers||{}; STATE.workers[cardId]=name.trim(); saveState();
  }
  punchIn(cardId,name);
}
function punchIn(cardId,name){
  STATE.shifts=STATE.shifts||[];
  const sh={id:uid(),cardId,name,in:new Date().toISOString(),out:null,mins:0};
  STATE.shifts.push(sh);
  ACTIVE={cardId,name,shiftId:sh.id};
  document.body.classList.add('in');
  const w=document.getElementById('activeWorker'); if(w) w.textContent='● '+name;
  saveState(); renderTabs(); switchTab(START_TAB);
  toast('Welcome, '+name);
}
function openPunch(){ if(!ACTIVE) return; const w=document.getElementById('punchWho'); if(w) w.textContent=ACTIVE.name+' — scan your card or confirm'; document.getElementById('punchModal').style.display='flex'; }
function closePunch(){ document.getElementById('punchModal').style.display='none'; }
function confirmPunchOut(){
  if(!ACTIVE){ closePunch(); return; }
  const sh=(STATE.shifts||[]).find(x=>x.id===ACTIVE.shiftId);
  if(sh){ sh.out=new Date().toISOString(); sh.mins=Math.max(0,Math.round((new Date(sh.out)-new Date(sh.in))/60000)); }
  saveState();
  ACTIVE=null; const w=document.getElementById('activeWorker'); if(w) w.textContent='';
  closePunch(); document.body.classList.remove('in'); toast('Punched out');
}
function manualSignIn(){
  const known=Object.values(STATE.workers||{});
  let name=prompt('Sign in — enter your name'+(known.length?' ('+known.slice(0,4).join(', ')+')':'')+':');
  if(!name||!name.trim()) return; name=name.trim();
  let cardId=Object.keys(STATE.workers||{}).find(k=>STATE.workers[k].toLowerCase()===name.toLowerCase());
  if(!cardId){ cardId='manual-'+name.toLowerCase().replace(/\s+/g,''); STATE.workers=STATE.workers||{}; STATE.workers[cardId]=name; }
  punchIn(cardId,name);
}

function allIngredients(){
  const m={};
  PROD_KEYS.forEach(pk=>PRODUCTS[pk].ingredients.forEach(ing=>{

}
// php ingredient cost per bar for a product
function ingCostPHP(pk){return PRODUCTS[pk].ingredients.reduce((s,i)=>s+i.php,0);}
// full landed cost per bar in PHP
function barCostPHP(pk){return ingCostPHP(pk)+LABOUR_PHP_PER_BAR+PACKAGING_PHP_PER_BAR+SHIPPING_PHP_PER_BAR;}
function barCostCAD(pk){return barCostPHP(pk)/FX;}
function barProfitCAD(pk){return PRODUCTS[pk].priceCAD - barCostCAD(pk);}

// order totals
function orderRevenueCAD(o){ if(o&&o.agreedTotal!=null&&o.agreedTotal!==''&&!isNaN(o.agreedTotal)) return Number(o.agreedTotal); return Object.entries(o.items).reduce((s,[k,q])=>s+(PRODUCTS[k].priceCAD*q),0);}
function orderCostCAD(o){return Object.entries(o.items).reduce((s,[k,q])=>s+(barCostCAD(k)*q),0);}
function orderBars(o){return Object.values(o.items).reduce((s,q)=>s+q,0);}

function importData(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=function(){
    try{
      const d=JSON.parse(r.result);
      const st=d&&d.state?d.state:d;
      if(!st||typeof st!=='object'||!Array.isArray(st.orders)){ toast('Not a valid backup'); return; }
      if(!confirm('Replace ALL current data with this backup?')) return;
      STATE=Object.assign({orders:[],batches:[],inventory:{},ingredientCosts:{},deliveries:[]}, st);
      if(d&&d.biz){ try{ localStorage.setItem('kalinga:biz',JSON.stringify(d.biz)); }catch(e){} }
      saveState(); if(typeof pushState==='function') pushState();
      renderTabs(); switchTab(CURRENT_TAB); toast('Backup imported');
    }catch(e){ toast('Could not read file'); }
  };
  r.readAsText(f);
}

  if(!confirm('Delete ALL orders and production data? Inventory catalog is kept. This cannot be undone.')) return;

function weekStart(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x; }
function renderStats(){
  const shifts=STATE.shifts||[]; const now=Date.now();
  const open=shifts.filter(s=>!s.out);
  const t2=(d)=>new Date(d).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  const openRows=open.map(s=>{const el=Math.round((now-new Date(s.in).getTime())/60000);return `<tr><td><strong>${s.name}</strong></td><td>${t2(s.in)}</td><td class="right">${(el/60).toFixed(1)} h</td></tr>`;}).join('');

  // ---- work week Mon-Sat ----
  const wk=weekStart(new Date()); const wkMs=wk.getTime();
  const days=['Mon','Tue','Wed','Thu','Fri','Sat'];
  const grid={};
  shifts.forEach(s=>{
    const inD=new Date(s.in); const inMs=inD.getTime();
    const endMs=s.out?new Date(s.out).getTime():now;
    if(endMs<wkMs) return;
    const di=Math.floor((new Date(inD).setHours(0,0,0,0)-wkMs)/86400000);
    if(di<0||di>5) return;
    const mins=s.out?(s.mins||Math.round((endMs-inMs)/60000)):Math.round((now-inMs)/60000);
    (grid[s.name]||(grid[s.name]=[0,0,0,0,0,0]))[di]+=mins;
  });
  const fmt=m=>m?(m/60).toFixed(1):'·';
  const wkRows=Object.entries(grid).sort((a,b)=>b[1].reduce((x,y)=>x+y,0)-a[1].reduce((x,y)=>x+y,0)).map(([n,arr])=>{
    const tot=arr.reduce((x,y)=>x+y,0);
    return `<tr><td><strong>${n}</strong></td>${arr.map(m=>`<td class="right">${fmt(m)}</td>`).join('')}<td class="right"><strong>${(tot/60).toFixed(1)} h</strong></td></tr>`;
  }).join('');
  const wkDate=`${wk.toISOString().slice(0,10)}`;

  // ---- this week's batches ----
  const inWeek=b=>{ const d=b.curedAt||b.started; return d && new Date(d).getTime()>=wkMs; };
  const made=STATE.batches.filter(b=>['cure','ready','shipped'].indexOf(b.status)>=0 && b.madeBy && inWeek(b));
  const agg={};
  made.forEach(b=>{ const w=agg[b.madeBy]||(agg[b.madeBy]={batches:0,bars:0,setup:0,make:0,clean:0});
    w.batches++; w.bars+=b.qty||0; w.setup+=b.setupMin||0; w.make+=b.makeMin||0; w.clean+=b.cleanupMin||0; });
  const phaseCard=(title,key,blurb)=>{
    const rows=Object.entries(agg).filter(([n,w])=>w.batches).sort((a,b)=>(a[1][key]/a[1].batches)-(b[1][key]/b[1].batches)).map(([n,w],i)=>{
      const avg=w.batches?Math.round(w[key]/w.batches):0;
      const medal=i===0?'🥇':(i===1?'🥈':(i===2?'🥉':''));
      return `<tr><td><strong>${n}</strong> ${medal}</td><td class="right">${w.batches}</td><td class="right">${w[key]} min</td><td class="right">${avg} min/batch</td></tr>`;
    }).join('');
    return `<div class="card"><h3>${title} <span class="muted">this week</span></h3>
      <p class="muted" style="margin-top:-4px">${blurb}</p>
      ${rows?`<table><thead><tr><th>Worker</th><th class="right">Batches</th><th class="right">Total</th><th class="right">Avg</th></tr></thead><tbody>${rows}</tbody></table>`:`<p class="muted">No batches yet this week.</p>`}
    </div>`;
  };

  $('#view-stats').innerHTML=`
    <div class="page-head"><div><h2>Stats</h2><p>This work week (Mon–Sat), starting ${wkDate}. Keep your times sharp and your batches clean.</p></div></div>
    <div class="card"><h3>Currently working <span class="muted">(${open.length})</span></h3>
      ${open.length?`<table><thead><tr><th>Worker</th><th>Punched in</th><th class="right">Elapsed</th></tr></thead><tbody>${openRows}</tbody></table>`:`<div class="empty"><div class="big">◇</div>No one is punched in.</div>`}
    </div>
    <div class="card"><h3>Work week — hours per day</h3>
      ${wkRows?`<table><thead><tr><th>Worker</th>${days.map(d=>`<th class="right">${d}</th>`).join('')}<th class="right">Total</th></tr></thead><tbody>${wkRows}</tbody></table>`:`<p class="muted">No hours recorded this week yet.</p>`}
    </div>
    ${phaseCard('Prep','setup','Setup &amp; mise en place. Faster is better — but never skip a safety step.')}
    ${phaseCard('Production','make','Time mixing, pouring and moulding each batch.')}
    ${phaseCard('Cleanup','clean','Neutralise, wash and reset the station. A clean shop is a safe shop.')}`;
}

}
function renderTabs(){
  const openOrders = STATE.orders.filter(o=>o.status!=='shipped').length;
  const toMake = STATE.batches.filter(b=>b.status==='make').length
               + neededBatches().length;
  const ready = STATE.batches.filter(b=>b.status==='ready').length;
  const c = {orders:openOrders, make:toMake, ship:ready};
  $('#tabs').innerHTML = TABS.filter(t=>!(t.owner && ROLE!=='owner')).map(t=>{
    const badge = c[t.id]? `<span class="badge">${c[t.id]}</span>`:'';
    return `<button class="${t.id===CURRENT_TAB?'active':''}" onclick="switchTab('${t.id}')">${t.label}${badge}</button>`;
  }).join('');
}
function switchTab(id){
  CURRENT_TAB=id;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const v=$('#view-'+id); if(v) v.classList.add('active');
  renderTabs();
  ({dash:renderDash,orders:renderOrders,make:renderMake,prod:renderProd,
    inv:renderInv,ship:renderShip,work:(typeof renderWork==='function'?renderWork:()=>{}),settings:(typeof renderSettings==='function'?renderSettings:()=>{}),stats:(typeof renderStats==='function'?renderStats:()=>{})}[id]||(()=>{}))();
}
</script>
</body>
